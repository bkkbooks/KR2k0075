  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0075_WYG_001-1a, image: WYG0579/WYG0579-0488a.png}
body:
  text: 居濟一得卷一禮部尚書張伯行撰運河總論運河乃宋尚書未成之工也其創開者則濟寧州佐畢輔國始築金口壩以遏泗水又開金口閘引泗水由府河至濟寧濟運又築堽城壩以遏汶水又開堽城閘引汶水由洸河至濟寧濟運但濟寧地勢北髙而南下故水之往南也易而往北也難北運每虞其淺阻永樂九年宋尚書聽老人白英之計引汶水於南旺分流濟運引之誠是也但於是年到任即奉命取材於蜀平江伯陳瑄繼成其功於戴村僅築土壩其後潘季馴築石為壩萬恭纍石為灘亦僅百丈餘耳汶河水發之時不能暢流入海盡入運河堤岸難保而民田每受其害若戴村建閘建壩如堽城金口之制使可以蓄泄而運河自不至於泛濫矣是汶河之工尚未成也至於泗河並未議及雖今亦蓄之馬場湖但府河淤塞已為平地泗河之水入馬場湖有限以故雨潦之年運河水大馬場湖水亦大天旱之年運河水小馬場湖水亦小而十里鋪閘與安居閘又近濟寧二閘一開湖水泄盡無餘故馬場湖雖有蓄水之名泗水並無濟運之實是泗河之工尚未成也泗水不至馬場湖盡由魯橋入運而汶河口在南旺之南故雨潦則南陽夏鎮一𣲖汪洋而天旱之年阿城東昌處處淺阻今宜將汶河口改於南旺北十里許將泗河口開於南旺南十餘里許再將府河挑挖深通如舊則用泗水以濟南運用汶水以濟北運則南運無泛濫之虞而北運亦無淺阻之患矣再查南旺運河兩岸土積如山每逢大挑百倍艱難若將汶河口移於南旺北十里許不惟兩岸平坦大挑易於為力而數年之後戴村閘壩修完則將汶水引入湖中換湖中清水入河濟運而大挑亦可免矣汶水泗水並出濟運自無水小之患矣若猶慮水小則閘座不可以不嚴也查荆門上下閘阿城上下閘所以關南旺以北之水猶之天井在城閘趙村石佛閘所以關南旺以南之水也天井在城趙村石佛鎖鑰俱掌之濟寧道則荆門上下阿城上下四閘亦宜嚴加鎖鑰掌之捕河㕔如天井在城趙村石佛之例一啓一閉則水自不至於妄泄矣况沙河棗林河皆係濟運之河特以數百年來盡皆淤塞水勢不通若大加疏濬令其深通暢流則水自有餘而無不足之患或曰汶泗二水並出濟運再加以沙河棗林河之水運河之水不慮其太大乎曰不然天井閘以上水大則有永通閘在宜將永通閘修補完固一遇水大即為開放泄入牛頭河至江南海州下海若荆門閘上水大則有五空橋減水壩在若慮壩底太髙不能泄水則宜於大感應廟東建減水閘一座一遇水大即為開放泄入鹽河由濟南府雒口下海如是則水既足以濟運又不患其大矣此運河之大勢酌乎古人之成法驗之當今之地勢誠屬萬全不易之良策也但余識見短淺言未必當敬録於此待質髙明嶧縣縣丞嶧縣縣丞專以蓄微山湖水為職蓋微山湖水所以蓄之濟八閘之運者也故韓莊湖口閘最關緊要堵閉不嚴則水從此泄必將兩板嚴下中間用掃堵實則水不妄泄矣但徐州往來民船皆從此閘入運河閘夫借此取利則湖口閘必不能閉宜時為稽察疏失嚴究臺莊等八閘臺莊等八閘月河皆宜挑挖寬深使微山湖之水有所泄則濟寧南鄉及魚臺沛縣徐州之田地自不至於淹沒矣蓋八閘月河盡皆淤塞微山湖向出荆山口由彭家河泄今則荆山口已經淤平不能宣泄若將月河挑挖深通則湖水可泄必不至泛濫於濟寧魚臺一帶此今日最急之務也倘微山湖水小自宜蓄之濟運八閘仍宜下板嚴閉不可輕泄微山湖微山湖水所以接濟運河之不足者也故常宜閉板蓄水至八閘下板水猶不足然後酌量啓板以接濟之蓋湖水小則八閘宜下板湖水大則八閘不宜下板若湖水盛大八閘不下板仍宜開八閘月河以放之此湖南岸宜築堤以障黃水自沛縣太行堤接築由荆山口南至子房山下若不築此堤或數年或數十年後微山湖勢必如堽頭湖淤為平陸不特無水濟運黃水且灌入運河運河又必淤塞矣夫舊運河原在南因黃水淤塞改開泇河若泇河再淤又從何處改挑乎此不可不早為之計也又微山湖南宜築攔黃堤一道上接沛縣太行堤下至徐州荆山口黃水泛漲時使由堤南東行入彭家河至猫兒窩微山湖清水使由舊河出荆山口合彭家河亦至猫兒窩蓋堽頭湖俱經淤平微山湖已淤大半南岸若不築堤不數十年黃水屢灌微山湖勢必淤平不惟不能蓄水濟運恐泇河亦受其淤所關運道非淺鮮也彭口每年彭口當大挑之期宜於彭口上源築壩使水由三河口入運河又於運河彭口之上築攔河大壩一道使運河之水由吕壩入微山湖則彭口上下內外俱可以挑挖矣既挑完彭口運河俟關壩之後即將彭口內石壩上石壩下盡挑挖深通俟五六月伏水將發之時然後將三河口上源築壩將彭口上源之壩開放使水由彭口而入運然後將三河口石壩上下挑挖深通以便大挑之時使水仍由此入運若以築壩不便即輪年遞挑亦可今年挑三河口即使水由彭口出明年挑彭口即使水由三河口出以一年之力挑河而河有不深通者乎又彭口之水原從三河口出今三河口內現有石壩其後改於彭口亦照三河口建壩每於冬月挑河之時將壩上里許築一土壩遏水他流然後將石壩上下挑濬深廣使足容沙而正河不至於淤塞其後河官樂於簡便遂止挑正河而石壩上下置之不問不知挑石壩上下而正河必不淤淺不挑石壩上下而正河勢必淤淺今彭口每年止挑正河一遇水漲河身即為淤塞糧船既被阻滯撈挖倍費人力此余所目睹者也其如人情難於更始何哉河隄事宜山東之河南陽一帶每年潰決者皆由舊有減水閘三十二座今皆無存所餘者三兩座耳水不得歸湖是以潰決堤岸似宜查明修補滕嶧兩縣石工前經估計三十二萬兩勢必難行擬於湖邊用草河邊用土築成土堤一道俟秋後用夫採草冬月可做減水閘㑹典云昭陽湖周圍八十餘里在滕沛魚臺三縣界內舊設減水閘十四座遇河泛漲啓閘泄水下達微山等湖以濟韓莊閘東泇河運道愚按減水閘所以節宣運河之水使常平者也今查減水閘所存者僅四座耳數年以來運河水大不能宣泄以致冲決堤岸淹沒民田其害不可勝言皆由減水閘不復之故也今若將舊閘照舊修復運道民生庶兩益矣滕縣主簿滕縣主簿亦以收水入湖為職三空橋朱姬莊減水閘皆湖口也每遇運河水大及伏秋水發即宜從此收水入湖蓄以濟運境內有彭口每年宜挑若彭口以下淺處多則宜將彭口以上築攔河大壩使水由引河西行至呂壩入湖以便挑挖彭口以下淺工若彭口以上淺處多則宜將夏鎮人家頭築壩又將朱姬莊減水閘下築壩使彭口之水由漸家口出朱姬莊減水閘入湖則彭口之上皆可挑挖若彭口上下皆淺則宜開康留壩却將彭口上源築壩使水由三河口入運河再於夏鎮之南築壩使水仍由吕壩入湖則彭口上下皆可挑挖矣運河北岸又有修永閘所以節宣泉水以濟運者也其內引河宜時加疏浚以備蓄泄朱姬莊一帶堤工單薄處甚多亦宜時加修築不可或懈至境內泉源皆以濟運尤宜時為稽察俾疏浚深通暢流入運庶為稱職沛縣主簿沛縣主簿専以收水入湖為職微山湖口有吕壩滿壩二處遇河水盛大或伏秋水發即當開此二壩收水入湖蓄以濟來歲之運不可有誤若少有怠玩不能蓄水即為溺職沿河兩岸亦宜時加修築境內有鮎魚泉每遇天旱中輒乾斷不能通水宜時加疏濬令暢入運珠梅閘珠梅閘係江南沛縣閘其上為山東邢莊閘舊例兩閘不相聞問並無㑹牌蓋以成規久廢獨山湖與運河相連水大之時獨山湖水可以接濟故上源之水不至膠舟一遇天旱棗林邢莊處處淺阻皆由珠梅閘放船無節泄水太過之所致也豫己將獨山湖築堤界出故此二閘須用㑹牌照例啓閉庶水不至於大泄若遇水小則開獨山湖口放水以助之若水太小船隻難行須珠梅閘一啓板放船五六百或七八百然後珠梅閘再啓板灌放則水不太泄而船自易過矣魚臺主簿魚臺有南陽獨山二湖皆所以蓄水濟運也運河兩岸俱有閘座為主簿者惟在蓄泄得宜啓閉有方乃為稱職今閘座俱已廢壞堤岸悉皆殘缺非大加修理必不能有濟於運主簿以蓄水之多少為該職之稱否但南陽湖低於運河若將各閘門堵閉不放水入湖獨山湖髙於運河若將各湖口開放將水放盡此則溺職之甚者也魚臺境內泉源甚多尤宜時為稽察俾疏浚深通暢流入運斯為稱職南陽閘官南陽閘官管南陽利建邢莊三閘此三閘最關緊要下板一不嚴而魯橋棗林勢必淺阻故此三閘與棗林閘均宜候㑹牌必上下兩閘閉板中間一閘乃可啓板則水勢不致妄泄而糧運自無淺阻之患矣棗林閘棗林閘上下俱不深通故每遇天旱之年輒有淺阻而以上師家莊仲家淺新閘並無淺阻之患乙酉初夏遇淺阻船不得行豫設一法令啓師家莊閘板而船仍不行又啓仲家淺閘板而船遂通行直過上兩閘上下俱無淺阻此亦已試之一法也然又須南陽利建邢莊多下閘板草塞席貼不使過水則水不妄泄而船可通行浚白馬河白馬河之水原出魯橋以濟南運者也自河身淤淺每逢天旱則河水阻斷不能出而濟運故議大加挑浚使之寬深庶河水可出而南運為有賴矣師家莊閘此閘宜酌量上下水勢上下水勢俱足則此閘宜下板蓄水如棗林閘上水淺船不能行糧船既過棗林閘棗林閘閉板即啓師莊閘板如仍淺阻即並啓仲家淺閘則船自易行矣濟寧以南各閘放船之法濟寧以南不患水少故宜隨到隨過到一幫即過一幫到兩幫即過兩幫切不可一塘止灌一幫令一幫占一塘則山東四十八閘四十八幫船占住而船遂無可行之理矣石佛閘石佛閘閘背亦低趙村閘背既接髙四尺石佛閘背亦宜接髙三尺閘板宜上十四塊則上源之水有所蓄而不至於過泄矣趙村閘趙村閘閘背亦低在城閘背既接髙五尺趙村閘背亦宜接髙四尺閘板宜下十六塊始足以蓄水而糧船不阻山東運河山東運河關鍵全在各閘而最關緊要者尤在天井在城荆門上下磚板二閘也此六閘啓閉得宜則糧運必無淺阻之患而其職掌則在閘官閘官職微非有擔當者每聽命於往來之差船宜令㕔官主其事天井在城則以運河㕔主之荆門上下則以捕河㕔主之磚板二閘則以上河㕔主之查上河㕔向駐劄東昌府而臨清亦有衙門宜令改駐臨清若有差船欲恃强啓板令閘官稟於㕔官㕔官以理諭之令其遵照定例隨漕打放若㕔官再不能主則申報濟寧道定奪但閘官係専職恐有民船受賄私放者亦未可定須道㕔各官不時稽查如有啓閉不時乖違職掌者立即揭報河院斥逐則閘官有所畏憚亦不敢私自啓板而狥私謀利者尤莫過於閘夫且有閘夫啓板而閘官不知者尤宜嚴飭閘夫使各依閘規方無錯誤在城閘在城閘背宜加髙二尺其閘板宜用二十二塊啓閉宜嚴蓋此閘係南運門戶最關緊要㕔道官宜不時稽查少有差錯上源必致淺阻其閘底閘墻亦宜時加修理恐有漏水之處且此閘閘官最關緊要倘啓閉不得其宜河水必致妄泄糧船恐有淺阻之患蓋此閘與荆門下閘相照一里二閘皆所以關水也又在城閘舊例下板十八塊始足蓄水蓋天井閘髙此閘最下若下板或少則水一泄無餘故此閘最關緊要其稽查之勤宜倍於天井閘始足以關住上源之水而不至於下泄此南運之一大關鍵也其放船之法亦宜隨到隨放則濟寧以南之船自不至於壅積然此塘之船須儘塘灌放庶水不至於多泄而上源亦免淺阻之患又在城閘宜下板十八塊蓋天井閘髙而在城閘低非多下板則天井閘一啓板而水皆下泄矣故宜多下板而天井閘上之水始有所蓄如下源水小或致淺阻或再啓一板放一漕水下去或酌量啓板一二塊放水下去俟水足用即照舊下板蓄水毋得多泄又在城閘啓閉視南陽一帶水之大小如南陽一帶水大則將在城閘板少啓在城閘下積船一百二三十隻足滿一塘然後啓板灌塘則水之所泄必少而南陽一帶不患乎水大矣如南陽一帶水小需水甚急則在城閘啓板宜勤到一幫即過一幫不拘船數之多少則水之所泄必多而南陽一帶不患乎水小矣總之下用水則宜泄下不用水則宜蓄務斟酌得宜蓄泄有方乃為盡善又在城閘地勢甚低而其閘背亦低故不能多下板塊不能多下板塊即不能關上源之水宜將此閘背再接髙五尺則板可以多下或二十塊或二十二塊則上源之水有所關而不至於過泄前言下板十八塊者以閘背太低不能多下非謂十八塊足以關水也天井閘天井閘亦視南陽一帶水之大小如南陽一帶水大則將天井閘以上如南旺之十字河先行堵閉如水仍大則五里營閘十里鋪閘及安居閘酌量堵閉務使水不甚大而後已如南陽一帶水小則將安居閘十里鋪閘及五里營閘酌量開通如再不足用然後將南旺之十字河開通若蜀山湖之利運閘則斷斷不可開者也往年天井閘水勢甚溜每過一船需夫四五百名一日過船不過一二十隻至多不過三四十隻以致在城閘下糧船積聚至數百隻或千餘隻皆因在城閘祗下板十二塊天井閘板一啓水勢建瓴而下在城閘之泄水既多不獨天井閘糧船難過而漕井橋及安居一帶在在淺阻司事者不思咎由於在城閘之下板甚少而反歸咎於上源之來水太微則又開蜀山湖之利運閘以助之利運閘一開而獨山湖南陽湖與運河一𣲖汪洋湖河莫辨由是濟寧南鄉及魚臺沛縣徐州數百萬頃良田悉化為湖蕩已二十年矣而此四州縣之民並不知為人事所致反歸咎於天災之流行嗚呼天以生物為心何至不仁如是哉余到任年餘日乘小艇上下往來周詳審視考之古人之制度驗之今日之形勢固已瞭然於胸中矣一日適在天井閘催船見水勢甚溜一船需夫數百名縴挽呼號之聲不絶而船之過也維艱且天井閘船未過完而漕井橋安居一帶又報淺阻矣余詢之於人或曰非開利運閘則糧船必不能前進矣余曰利運閘必不可開者也乃令在城閘增板至一二塊而水勢仍溜又增至三塊四塊而水勢稍平更增至五塊六塊連前共十八塊而水勢悉平天井閘過一船不過需夫三五名而已且船未過而漕井橋安居一帶糧船俱已行動嗣後天井閘一日一夜過船二百八十餘隻而糧船乃不知有天井閘之難過矣余恐日久弊將復生故書之以備後人之採擇又天井閘宜用板十五塊使水蓄在閘上常使有餘毋使不足此閘啓板在城閘須下板十八塊勿使水泄過多如下邊水小酌量啓板一二塊放下些須足用而止不可過泄須與在城閘兩相照應為妙又天井閘舊例板係十五塊此一定不可易者也板不全下則上源必致淺阻閘官宜常稽查閘牌同知州判亦宜常稽查閘官蓋閘夫利於少下少下一塊則少啓一塊此好逸惡勞之常情也若聞閘上一帶水淺必此閘下板未足之故急宜查考加板則上源永無淺阻之虞至於此閘之船必須隨到隨放不可稍遲以致濟寧以南一帶之船壅滯不行此閘放四次或五次通濟閘始可放一次若此閘水小不能放船即令通濟閘放船則此閘有水矣然又不専恃通濟閘上之水須馬場湖水常盈滿或開安居閘或開十里鋪閘水自足用若長溝建閘則止開長溝閘十里鋪安居閘俱可以不開矣運河源委運河之開始於濟寧州佐畢輔國建金口壩開金口閘引泗河之水至濟寧又建堽城壩開堽城閘引汶河之水至濟寧由楊家壩至蓮亭前分流濟運然地勢北髙而南下故於蓮亭之東建天井閘又於天井閘下里許建在城閘所以堵水使不南下也又於濟寧之北百里外建開河閘所以放水使北行也豈知水之往南也易而往北仍難此濟寧州佐只知引水至濟寧濟運而未嘗合南北之地勢而通計之也至尚書宋禮聽汶上老人白英之計改河於南旺分流濟運蓋白英世居南旺亦只知引汶水於南旺而未嘗合南北總計之並未知畢輔國開河之始仍資泗水濟運也兼以尚書宋禮於永樂九年到任旋於是年奉命取材入蜀是以雖改壩於戴村而未如堽城壩堽城閘之制度盡善也所以數百年來雖漕運享其利而南旺歲挑勞民傷財遂貽數百年無窮之害且南旺以南魚沛之間因泗水全注於南一派汪洋甚至濟寧以南盡被淹沒而南旺以北東昌一帶仍苦水小每有膠舟之患後又議開金龍口引黃河之水至張秋接濟北運豈知黃河之水一經漲發其勢莫禦故張秋屢被水患而金龍口永議堵築金龍口既堵之後北運仍然水小卒亦無如之何也且南旺運河兩岸土積如山將來挑河恐愈艱難矣白英只知有南旺而引水於南旺猶畢輔國只知有濟寧而引水於濟寧者也今合南北之大勢計之宜將汶河之分水口改於南旺之北十里開河之南分流濟運而又於戴村壩改建如堽城壩堽城閘之制度再將泗河之水引至獲麟古渡以西使泗水由馮家滚水壩舊河出壩西入運河或曰馮家滚水壩所以泄蜀山湖之水入馬場湖也此壩一開不虞蜀山湖之水南下乎不知馮家滚水壩之西挑河入運即以挑河之土築蜀山湖之湖堤則蜀山湖之水既不至於南泄而泗河之水又可以濟北運且戴村壩既如堽城壩堽城閘之制度則南旺之歲挑可省魚沛之間既不苦於淹沒東昌一帶又不至於膠舟真萬世之永利也此竭四載之奔走耗四載之心血而僅有此一得恐致湮沒故附録於此以就正有道焉濟寧分水郡志曰按汶水西流其勢甚大而元人以濟寧分水遏汶於堽城非其地矣每遇水發西奔坎河洸流益微運道或壅故元時㑹通歲漕不過數十萬石不若海運之為多也愚按元人分水於濟寧亦未審乎地勢之宜耳濟寧北髙而南下故水之南行也易而北行也難雖天井閘離分水口僅數丈而開河閘去分水口一百餘里然究之南水每有餘北水常不足故南旺每有淺阻宋禮聽白英之計改分水口於南旺其制善矣但止言汶水而不及泗水亦未為法之盡善也雖泗水蓄之馬場湖中亦由安居閘十里鋪閘入運不知運河水大而馬場湖水亦大運河水小而馬場湖水亦小究歸無用蓋因府河淤塞水不大通也况安居閘十里鋪閘猶是當年之舊閘當年馬場湖受蜀山湖之水故宜由此入運今馬場湖不受蜀山湖之水而受泗河之水故今馬場湖之水不宜由安居閘十里鋪閘入運而宜於獲麟古渡建閘一座使泗河之水由此入運則以泗河之水合諸泉水以濟南運而以汶河之水專濟北運則北運自無淺阻之患矣或曰安居十里二閘亦可以入運何必又改於獲麟古渡不知安居十里二閘地勢最下不足以敵汶水獲麟古渡在通濟閘之上泗水若由此入運便足以敵汶水使汶水不致南泄專濟北運又何有不足之患乎閉楊家壩楊家壩自總河楊芳興已經奉㫖堵閉今復言閉楊家壩何也秪因濟寧紳襟士民旋謀馬場湖湖地肥美盡皆占種故楊家壩時常盜開楊家壩一開而西湖之水涸矣今議必為嚴禁如有盜開者即以盜決河防論然禁止者官而賄賂之說行官亦不肻認真矣非極有撡守不顧情靣者萬不能禁也金口閘金口閘泗水濟運之要路也所關甚重不可忽略查舊例每年挑完南旺即挑府河蓋以泗水入黑風口由兖州府而行故謂之府河蓄之馬場湖以濟運自十數年來官役河棍羡慕馬場湖地肥美南旺大挑之後府河並不挑挖泗水之入馬場湖者不及十分之一故將泗河竟置之無用之地而馬場湖竟盡成民田矣訪之土人舊府河有丈餘深今沿河考之深者尺餘淺者不及數寸水之所以入馬場湖者正有限也若將此河挑挖照舊寬深引水入馬場湖而湖水又不使之出安居十里鋪閘而使之由大長溝入運則泗水可以濟南運而汶水專濟北運則北運東昌一帶可永無淺阻之患再將戴村照堽城金口之制建閘建壩引水濟運餘水由鹽河入海則運河南北四十餘州縣永無淹沒泛溢之患即南旺之大挑可省而山東之夫役可永息矣金口壩金口壩遇冬月挑河煞壩之期即將此壩嚴閉使泗河之水盡歸金口閘入馬場湖以濟運大挑府河府河所以引泗水濟運者也舊例南旺大挑之後即挑府河近數十年來府河竟不挑矣故有淤至五六尺至七八尺者府河淤淺不能容水兩岸又無堤工一經水發兩岸民田盡被淹沒故必大加挑浚即以挑河之土築兩岸堤工則河既寬深即能容水而民田不至淹沒然須從黑風口內即大挑寬深庶泗水之入府河也易不致由金口壩南泄矣又查府河舊有丈餘深年久淤墊深者不過二三尺淺者不過數寸以故泗河不能濟運畢輔國原引泗水至濟寧濟運今楊家壩既堵築泗河之水不由濟寧入運乃由濟寧北關入馬場湖查馬場湖原受汶河之水由蜀山湖東馮家滚水壩而來者也故今一大挑府河並挑馮家壩下至引河仍將馮家壩建閘一座又將馮家壩築隔堤一道以堵蜀山湖之水却將馮家壩西開引河一道使水由十字河北入運再將獲麟古渡建閘一座獲麟古渡即今之大長溝渡口是也居濟一得卷一
