body:
  text: 居濟一得卷七禮部尚書張伯行撰治河總論自古稱治水者必曰神禹孟子曰禹之行水也行其所無事也夫禹之治水疏瀹決排何嘗無事特以能順水之性故有事而一如無事也水之性以海為歸故禹之治水即以海為壑若開六壩是以淮揚為壑也故東去祗宜開海口西來切莫放周橋黃日瑾所以兢兢致辨於周橋之必不可開者也周橋不開則淮揚可免昏墊矣昔潘印川先生之治河也一到河工乃乘小艇遍視情形因而歎曰今日河道之壞病在髙堰設閘壩乃盡塞諸決使之歸一以水攻水即以水刷沙海口不濬而自開矣此所謂不以人治水而以水治水者也故當日不過使髙堰之通者塞之海口之塞者通之而河已告成功此一大治也逮至今日而河道之壞乃有大異焉者蓋治之而使壞非壞而求其治也何也昔之害在髙堰通而不塞而今日且開六壩矣昔日之害在海口塞而不通而今且築攔黃壩矣髙堰既開六壩海口且築攔黃欲河之不壞也有是理乎至河工既壞不歸咎於六壩之開攔黃壩之築而乃歸咎於河之不治也夫河性善下而使之就髙河性喜順而使之從逆河亦無如之何也及其泛濫不以為治之之誤而以為水之為害水豈任咎哉我皇上聰明天縱哲謀性成軫念民生親視河工不憚再三洞悉河工之壞皆由於六壩之開乃命諸大臣堵塞六壩且加築髙堰廣闢清口大挑運河盡塞諸決折攔黃壩使水由大通口下海仍堤歸仁挑鳯凰橋人字河及蝦鬚溝芒稻河俾水盡歸海不二年間而奏平成之績漕運無虞民生樂利何莫非我皇上神謀妙算睿慮周詳親視河工指授方略之所致哉治河當酌古通今方聖時序北河紀曰天下大經濟人必天下真讀書人以豫觀河工之壞往往壞於不學無術之人蓋古人制度卓有成見確然可守後人不審古人立法之意而妄行已私變亂成規及至河工已壞而歸咎於河曰河之難治也茍循古人之成法而恪遵之或有宜於古而不宜於今者則稍為變通焉而仍不失乎古人之意又何河之不可治哉然非天下真讀書人必不能也豫故有感而發焉天下真讀書人其平居時即以天下為已任其所讀諸書皆經濟大文章由是措之於用又焉有不合者哉潘印川先生曰時勢懸隔修防異宜可因則因如不可則急返焉勿以僕誤後人使後人復誤後人也若泥古人成法而不達時變是又不善讀書者也書曰事不師古無以克永世又曰神而明之存乎其人是在治河者之善會之耳黃淮水利西北水利在黃河之北者莫大於沁河沁河發源於山西由河南懷慶府武陟縣入黃河若於木欒店倣金口壩金口閘堽城壩堽城閘之制修成閘壩冬春俱係清水則閉壩開閘引清水入內河夏秋水發恐有混濁則閉閘開壩放入黃河總之清水則引入內河濁水則放入黃河必不使涓滴入內河則由木欒店以下至陳橋由陳橋至黃陵岡由黃陵岡至張秋若運河水小則使之入運河濟運由臨清至天津下海若運河水大則使之由五空橋穿運河入鹽河至濟南府雒口下海或由雙河集引入牛頭河由濟寧魚臺至微山湖如水勢仍大則使之由荆山口彭家河貓兒窩過駱馬湖入中河濟運而中河之尾仍使之由鹽河下海如駱馬湖口水勢仍大則使之由西寧橋河由宿遷桃源清河安東沭陽海州五港口下海則由木欒店以至五港口凡有可以開通河道挑挖溝洫灌溉民田者皆可做成水田而河北之水利溥矣西北之水利在黃河之南者莫大於淮河淮河發源於河南桐柏山由開封歸德亳州鳯泗至天妃廟上出清口此古之小清口也古黃河在清河縣之後淮水出小清口獨行五六里至大河口黃河由清河縣後亦獨行至大河口淮合於黃黃合於淮是為淮黃交會處也是小清口至大河口淮黃交會處尚有五六里之遙黃水安得逆流而上倒灌清口乎今則黃河已遷於清河縣之前矣黃淮交會於清河口黃水直衝清口故歷年以來總不免於倒灌之患倒灌洪澤湖則淤洪澤河倒灌運河口則淤運河黃水小灌則小害大灌則大害或歸咎於黃之強或歸咎於淮之弱總未有以治之而使之不為害也愚不自揣欲將清河口堵閉使淮水獨入運河由天妃廟後離河稍逺之處開引河一道穿過堤北於堤河適中之處使之直往東行至鮑家營河口對過開河口放入黃河則黃水既無倒灌之患而糧船由清江浦至天妃廟後御示閘對過再開引河一道入新河出口過黃河較之出舊清河口又覺順便矣且黃水即有倒灌一入引河自往東行而不能西行矣若慮新河一時不能寬深恐不足以泄淮水則將舊清口之西御壩之東開引河一道建閘一座淮水大時則啓板放入黃河黃水大時則閉板以拒黃不使倒灌洪澤湖蓄泄有方似屬妥便但此時淮河由開封至歸德久經淤塞必大加開通中間凡有可以開通河道挑挖溝洫灌溉民田者皆可酌量行之至運河口之東有可以開河引入髙家堰內灌溉民田者則酌開河道多挑溝洫使髙堰之內盡成膏腴之田再將清江浦檀渡寺東運料小河閘座修理堅固仍將運料小河盡行疏通以至海口則由此放水可以灌二百餘里之民田矣再於淮安之西舊栁溝河開通引水灌田再於淮安之南劉均溝涇河澗河子嬰溝盡行開通放水灌田餘水下海並將鳯凰橋人字河芒稻河白塔河盡行開通引水灌田且於運河兩岸各閘壩俱行修理以備蓄泄則髙寶湖水可以放入運河運河之水亦可以灌田且放之入海入江而不至有泛濫之虞矣觀沁河淮河之可以分流灌田則各省凡有清水之處皆可以設法灌田而水利益溥矣是在後之君子講求而酌行之耳引沁入運豫任濟寧道時曾條陳河院蒙委筆帖式察壽確查明白又蒙委北河廳鄧之琮丈量估計銀十四萬兩後以豫升江南臬司未經具題淮河自開封至歸德一假二十年前每逢新撫臺到任即議挖河後有阻之者因不果行條陳通會河自古言治河者曰疏曰濬曰築曰塞然而疏濬築塞亦在審乎蓄泄之宜而已宜蓄者蓄之宜泄者泄之而河猶有不順其治者未之前聞余嘗往來河工見夫黃河之險苦於水之無所泄也而中河之水大者宜泄小者宜蓄將欲泄黃河之水以入中河不惟河身狹小勢難容納又恐河底淤墊阻絶運道反覆思維有修通會河之一法為經久無弊之道宜於中河頭之北接駱馬湖口再開中河一道由錫成橋預偹河挑至清河縣北中間多用中河穿斷子堤令與現在中河相通其挖河之土即用加幫北岸遙堤中有黃家嘴支河一道亦宜開通若遇中河水大從此分泄黃河之崔鎮徐升季太三義等壩俱應開通使與現在中河相連若慮黃水淤墊則於現在中河之南另開水溝又於其中多開小橫溝使俱與現在中河相通則黃水之入中河者勢既分散清水一刷自不至於淤墊黃河之水既與現在中河相通中河之水又轉折與新擬中河相通黃河水大則入中河中河水大則入黃河黃河中河二水俱大則開劉老澗黃家嘴支河以入於海又何至有沖決之患哉至於新擬中河之尾若亦入雙金門閘則清河縣北恐有危險宜將遙堤穿開另鑿新河新河之北另築遙堤或即用挖河之土以築堤未嘗不可要二三里逺勢乃寬暢至清河縣對直之東其河即往南行穿舊遙堤使與現在中河之水會合出黃河以濟運而遙堤外新擬中河與新建遙堤仍直往東行至鮑家營止而於新運口之下各建一閘蓄水出口若運口清水太髙則開一閘以泄水使清黃之水相平則糧船易於入口若重運過完即將黃河邊之運口閉閘開中河二閘使一歸鹽河一歸鮑家營各入於海而王家營大壩之上新運口之下仍開平水河一道使黃河之水與新舊中河之水俱相通連至草灣則使黃河與鹽河相通至鄭家馬頭時家馬頭亦開通使與鹽河相連則水勢既平自不至潰決仲莊閘之壩亦開使與二中河相通作一平水河王營大壩之下以鹽河為黃河以現今黃河為洪澤湖水之河以鮑家營為駱馬湖水之河若慮洪澤湖水由舊河入海駱馬湖水由鮑家營入海而入鹽河之黃河恐有淤墊之患則將鮑家營河之閘壩堵閉使駱馬湖水盡歸鹽河輔黃而行以入於海自無泛濫淤墊之虞此平成永賴誠運道民生萬世之利也若慮工程浩大為費太繁則更有變通之法仲興集以上不必挑河仲興集以下酌量開通止開崔鎮徐升季太三義四壩及清河縣北遙堤外之河開陶莊閘陶莊閘下開大引河一道鄭家馬頭時家馬頭開通亦可告成此一時權宜之計也此係二十年前議論今觀之似仍有可酌行之處姑存之開鎮宣橋鎮宣橋宜於黃河涯開引河一道將攔黃堤穿斷入鎮宣橋河內其下令與中河相通仍宜多開木涵洞或十數里一個或數十里一個開石涵洞自三岔交界至鄭家道口計程二十二里有石涵洞一座自鄭家道口至崔鎮迤下計程三十里有石涵洞一座自崔鎮迤下至古城對過湯家道口計程三十里有石涵洞一座自古城對過至宿遷縣北車路口計程五十里有石涵洞一座以上涵洞俱宜開通皂河皂河亦宜建閘黃水大時使由此引入運河之南不令直往北行斜向東北順運河南岸入運河李經邦閘李經邦閘各引河亦宜挑通如遇黃水大時由此閘引入中河既可以濟中河之運亦可以分黃水之勢駱馬湖口駱馬湖口宜照舊例用竹絡壩湖水大時則嚴加堵築不使入黃河黃水大時却放水入中河及西寧橋河則黃河之水自不至於甚大矣舊例用竹絡壩原所以備蓄泄也閉駱馬湖竹絡壩治水之法大者泄之小者蓄之黃河水之至大者也故祗宜泄不宜蓄今又增以駱馬湖之水又焉得而不為害乎故豫謂竹絡壩宜閉也或曰黃河沙重借湖水以刷之不然則黃河恐淤矣豫曰宿遷以上之黃河果誰為刷之乎而何以不聞其遂淤也豈不淤宿遷以上之黃河而獨淤宿遷以下之黃河乎其不足信也明矣或曰中河水小借黃河以濟運也豫曰宿遷以上之中河初無借於黃河之水而何以亦足濟運也况宿遷以下之中河又有駱馬湖水以助之乎豈宿遷以上之中河不借黃水以濟運而宿遷以下之中河必借黃水以濟運乎又豫之所不能解也又一竹絡壩宜閉也黃河之水滔滔而來勢不可遏顧可使駱馬湖之水助黃為虐乎故宜閉之使黃河少此一水即少此一水之害矣或曰黃河之沙全借清水以刷今使清水不入黃河則宿遷以下二百里之黃河不慮淤乎豫曰借清水以刷黃河理或有之獨是宿遷以下之黃河慮淤而宿遷以上之黃河獨不慮淤乎宿遷以下之黃河借湖水以刷之而不淤宿遷以上之黃河果誰為刷之而何以卒不聞其淤也且遙遙數千里之黃河數百年以來何以不聞其偶然或淤也此固不待辨而自明者也或曰往時湖水涸時中河水小仍借黃河濟運今而閉之倘中河水小糧船何以遄行乎豫曰現有李經邦閘在倘慮不足以濟運則於此閘之上下再建一閘使兩閘之水並入中河豈猶不足以濟運乎或曰湖水大長時仍由竹絡壩口以泄入黃河今為閉之倘湖水大長中河不虞泛濫乎豫曰於錫成澄𢎞橋之上下多開減壩使由髙山頭入鹽河下海又於其下中河兩岸多開涵洞北岸引水入預備河南岸將土塘河挖成引水入其中兩岸仍多穿溝渠使中河南北盡成水田又於遙堤之下多建涵洞使預備河之水有餘則從涵洞泄出遙堤之外使入鹽河下海而中河之水自不至於泛濫矣且將駱馬湖邊多開引河使水大之時由西寧橋河下海則湖水亦不至盛大矣開竹絡壩竹絡壩乃黃家嘴之舊支河也其遙堤內為預備河預備河既與中河相通中河又與黃河相通故於此處仍宜建減水壩一座泄預備河之水即以泄中河之水並以泄黃河之水建蕭家渡閘宜於髙山頭東新建格堤之東中河北岸子堤建􅉼洞一座使由格堤土塘河入預備河至蕭家渡建閘一座穿過遙堤使水由蕭家渡河入海宿遷縣北車路口中河北岸子堤有石􅉼洞一座子堤內宜挑河一道引入預備河亦使由蕭家渡入海疏東奠德逺鎮宣三橋此三橋皆所以泄黃水出髙山頭河而入海者也自中河開而三橋廢矣不知三橋固不可廢也人以為於中河有礙故不得不廢而不知於中河固自無礙也今宜仍為疏通以泄黃水使由中河之南直往東行過清河縣後至陶莊閘仍入黃河而於中河南岸子堤多開小㴠洞使與中河相通復西寧錫成澄𢎞三橋此三橋皆所以泄湖水使由鹽河下海者也今止存西寧一橋泄水而錫成澄𢎞二橋俱不泄水矣究其故亦恐其害中河也而不知中河固自無害也今西寧橋已泄湖水矣而錫成澄𢎞二橋又宜泄新中河之水當於大王廟西開減水閘二座使新中河之水俱由此泄入錫成澄𢎞二橋亦由髙山頭入遙堤外河下海減水閘底宜比中河底髙一丈使中河之水止存一丈餘俱由閘泄出其遙堤外之河道不必動帑挖河築堤止宜用歲修錢糧於水小時挖河水大築堤每年隨時修補則河日寬深而堤日髙大六縣之地俱成稻田矣其挖溝渠通水灌田之處聽從民便不議築堤為妙蓋一經動帑築堤則官堤不敢擅動民間反有不便者矣開西寧橋西寧橋河向係捐工人員挑河築堤今尚未成宜發帑挑挖成河以泄湖水使由鹽河下海開預備河新建格堤之東亦挖成河子堤亦建小􅉼洞一座引中河水由格堤土塘河入預備河順流而下則子堤之北遙堤之南俱作水田矣開中河頭新中河頭用二個舊中河頭於新中河建閘之南再開河頭一道亦用二個則水進必多若黃水盛大再開李經邦閘則三個河頭連黃水俱泄矣開劉老澗預備河作減壩劉老澗以上預備河數十丈已經淤平宜於通中河之處不必築堤建滚水壩一道壩底宜比河底髙八尺使中河之水常深八尺餘者盡皆泄出而於劉老澗對過中河北岸子堤宜堅築蓄水勿令由劉老澗泄出其由此以上數十丈亦宜多建􅉼洞使中河之水泄出預備河由劉老澗而出若將西草壩閉塞再建閘數座則預備河祗宜疏濬深通無需建壩矣新中河尾新中河尾遙堤之北宜挑一丈二尺深順遙堤往東宜挑二尺深用磚做成減水壩樣使中河止存一丈之水餘者盡要減出由遙堤外往東至鮑家營河入海中河過遙堤裡正對小閘河中河之東宜建小閘一座閘底宜比河底髙六尺用閘板水大則泄水小則蓄正對雙金門閘中河之東亦宜建小閘一座用板啓閉如上法一以泄中河之水一以沖下假鹽河使不至淤墊再往南又宜於東邉多開小木㴠洞頭用閘板酌量啓閉務使中河之水與黃河平以便行運仲興集宜用新挑中河自宿遷縣至清河縣黃河與遙堤相去俱逺惟有仲興集一假黃河與中河相去甚近前河院改於中河之北另挑中河一道斟酌甚當後河官以新河水淺因廢新河而行舊河獨不慮黃河之害乎故糧船宜行新中河而以舊中河之北堤作新中河之南堤即使黃河偶有疏虞亦不至為中河之害矣崔鎮對過建閘劉老澗以下崔鎮正對遙堤處其遙堤外之河與遙堤相去甚近此處亦宜建減水閘以泄預備河之水使劉老澗以下中河黃河之水亦由此泄出改挑中河中河尾宜於清河縣北遙堤之外改挑中河一道至清河縣東北再穿遙堤使南由清河縣東出黃河使糧船出清口往下順流行一里許至天妃廟後入中河口中河北水田中河北水田亦照南式但北邉遙堤內用預備河南邉臨子堤挖土塘河兩邉行水則遙堤之內子堤之外盡成水田矣中河南水田中河南子堤南岸挖小河一道多用􅉼洞以通中河之水小河南多橫挖溝渠以通田間則中河之南俱成水田矣此萬世之利也開峰山天然閘峰山天然四閘乃靳文襄所建以泄黃河異漲之水者也愚意既開周橋翟壩等閘以泄洪澤湖之水若慮清口之水不能敵黃則將峰山天然閘開放使黃水入湖以助湖水出清口敵黃若曰黃水不盛大則不能出閘愚以為黃水不盛大則亦不能倒灌清口必待黃水盛大之時清口慮其倒灌然後開天然閘放水入湖以助清水若可以通睢寧等湖則宜放入以淤各湖蓋聞睢寧五湖原係民田後因往東一帶黃水淤墊太髙不能下行故積水成湖今宜仍為淤平使照舊復為民田豈不美哉若此閘之水不能至彼則宜於天然閘之上或數十里另開一閘以淤此湖此法可以泄黃水使不得漫溢可以淤湖坡使成平地可以助湖水敵黃一舉而三善備焉者也開歸仁堤閘歸仁堤閘原因湖水盛大開之以泄湖水使入黃河者也今黃河已髙而湖水日深湖水已不能出閘矣故宜於周橋翟壩等閘開之後即將歸仁堤閘開放黃水使入各湖俟將各湖淤平然後自至洪澤湖洪澤湖坡亦可漸淤為平地此既可助清水敵黃又可使湖坡淤為平地豈非一舉而兩得之哉分泄黃水孫家集小閘下開引河一道可以泄中河之水勢中河西假自劉老澗以上東假自三義壩以上俱用新挑中河行運則崔鎮徐升季太三義各減水閘俱可開通使水由中河以南黃河以北俱往東行至雙金門閘對過開河放水以泄黃河有餘之水使由雙金門閘入鹽河下海若黃水大時將仲莊閘開通引黃水入雙金門閘下鹽河却從雙金門閘北小閘相近處開引河一道使中河之水由此河行至楊家莊開通御示閘過黃河使糧船由此來往若慮黃河水大倒灌淮河口則將中河之尾往東再挑數里合於鹽河使由鮑家營河下海糧船既由新中河行走則劉老澗孫家小閘及竹絡壩俱可以泄水下海矣中河頭以北西寧橋正西宜開引河一道建閘一座水大之時從此放水由西寧橋下海中河南分黃支河天下事必有創建非常之功而後可為久安長治之謨若徒為因循茍且之計終屬補偏救弊之術蓋不大創則不能大成也河之為害縷堤害之也欲河之大治必盡去北岸之縷堤而後可也而中河之南開支河一道以為分黃之河中河之北將預備河挑成以為泄水之河分黃之河使其由舊中河順流而下若舊中河斷處則另開小引河一道以相接連其河仍使與新中河相通使其水有餘則泄入新中河而泄水之河則使其出遙堤由鹽河下海若新中河之水有餘則令泄入預備河內使其出遙堤入鹽河下海各處縷堤自徐州至安東北岸俱開減水閘壩中河子堤清河後新中河挑完將宿遷中河頭且不築壩用中河之水刷新中河或刷黃河或由鹽河下海似屬可行中河南岸仲興集一段數十里無子堤似宜加築即以打堤之土於堤南挖成小河一道做分黃河將來亦有用處五空橋河亟宜挑成則清江永無水患淮安城南運河之南似宜挑引河一道水大開放并將澗河深濬則淮安城可以不險中河離北遙堤甚逺離南新築之堤亦逺兩岸俱無縴路勢必仍於南岸築縴路小堤一道即於縴路小堤之南挖成小土塘河一道將來若開崔鎮壩從此泄黃水使由陶莊閘出黃河是亦預備之一著也分水灌田中河北岸有小石閘數座俱可開通挑挖引河以分中河之水入西寧橋河下海則黃河以北清水皆可以灌田有餘之水皆可以下海矣是興水利即所以除水之害也仲家莊分黃支河宜用仲莊閘作河頭由清河縣北雙金門閘至清河縣東向陶莊閘仍入黃河清口可免倒灌之患支河在遙堤之南運河又宜在遙堤之北建減水閘壩一黃河兩岸宜建減水閘壩也蓋黃河之水天下之至大者也故不可使之合而但當使之分以合則勢大分則勢小也峰山既建天然閘矣聞此閘一放而睢寧膏腴之地盡成湖波則以下原淤髙而上原之水無所出也今宜於徐州之下查土性堅實可建閘之處建閘一二座下開引河引水入睢寧湖以淤湖坡使仍為膏腴之田不亦可乎上原既淤平則下原峰山閘亦可放矣若夫歸仁堤閘固所以泄湖水使入黃河者也然昔日湖水髙而黃水低固可以泄湖水今日湖水低而黃水髙獨不可以泄黃水乎故歸仁堤閘亦宜泄黃水以淤湖坡者也再於桃源縣上下查土性堅實可建閘者酌量建閘一二座以泄黃水使淤湖坡則黃水之勢可以漸減矣北岸如李經邦閘亦可以泄黃水入中河再如崔鎮徐升季太三壩皆可開也將中河南岸土塘河再挖寬深則三壩之水皆可由土塘河順流而下入舊中河由清河縣後而東出陶莊閘以入黃河矣或曰黃河之水宜合不宜分合則溜急而沙刷分則流緩而沙停子欲多開減壩以泄黃水將黃河獨不慮淤乎豫曰不然凡於諸閘壩所泄者出漕之水也若平漕之水又豈得而泄之哉則黃河固不患其或淤矣河道大勢宜先減宿遷至清河一帶黃河之水使小則不至倒灌清口而又於清口以下開分黃大河一入鹽河一入鮑家營河以大通口為大海口以平望河為鹽河海口以五港口為鮑營海口三河並流則清口之水自小矣然後將髙家堰一帶多建減水閘下開河道使髙家堰一帶堤內盡成水田下尾餘水可歸運河者仍歸運河由興文閘子嬰溝等閘泄出不能歸運河者則令入髙寶湖髙堰一帶泄水既多則洪澤湖水自然漸小又恐不能敵黃矣則於徐州以下黃河南岸相其地勢多建減水壩下開引河引入各湖先將各湖淤平然後漸淤洪澤湖以漸往南淤直使洪澤等湖滄海變作桑田祗留淮河一道則雖有大水不能為災地平天成而河工永享安瀾之休矣此一勞永逸之法也亦借兵於敵之法也減水涵洞黃河北岸縷堤減水涵洞宜在各險工之上口順堤挖引河使水逆行即於近引河之堤多開涵洞引水至縷堤內通中河與中河之水並行順流而下但恐雙金門閘必不能容故宜於遙堤之外改挑中河一道即以挑河之土築堤若縷堤內地勢太窪則引河與涵洞底不宜與縷堤內地相平或髙一尺或髙二尺縷堤涵洞內用小掃接至平地庶不至沖成深潭南岸險工建越堤水猶賊也勦之皆我徑敵撫之皆我赤子故順之則治逆之則亂黃河南岸險工內各宜築越堤要與險工相離甚逺使可容水有越堤者即宜於險工之上口順堤挖引河一道離險工稍逺乃對堤挖引河使穿縷堤入越堤內順越堤土塘河往下行又於險工之下越堤之內開引河穿縷堤以出越堤內之水使仍入黃河則險工可以不險矣此順而治之不與水爭用撫之之法者也南岸險工則北岸開涵洞南岸開越堤內分水河兩泄其水北岸險工宜多設涵洞乃可泄水大分黃河宜於廢閘塘東或陶莊引河之下開大引河一道引黃河入鹽河又於廢閘塘東南開小引河一道引廢閘塘清水至黃河邉入分黃大引河輔黃而行則引河不致淤墊久之而黃河盡歸鹽河矣且於引河入鹽河之處又穿斷遙堤使通遙堤外鮑家營河中間又作平水河數道直至鮑家營河往北止則黃河之水一半歸鹽河一半歸鮑家營河而黃河水勢自減而老壩口車路口及韓尹二莊安東縣便益門新港唐家堡周家渡茭陵二塘童家營遙灣老堤頭各險俱可不險矣至於北遙堤外各河道不用大興工作止宜於水小時疏通河道水大時加築堤岸使遙堤之北盡成清水小河則海州贑榆沭陽宿遷桃源清河六縣之地盡成水田矣復張福王簡黃韶口此三閘相傳以為湖水大則開之使泄入黃河黃水大則閉之不使其入湖者也愚意此三閘皆所以節宣清口使其水常平以便行運者也黃水逼近清口則閉之以蓄水敵黃清水太髙則酌量開放使其水常平則運船之出口既易而黃水亦可免倒灌之患此節宣之法為最善者也故宜復之但今湖水離堤甚逺須酌其宜不必拘舊制收束清口洪澤湖水既小則清口不宜太寬宜收束使窄若慮口小則水急運船難行則宜於清口之上復張福王簡黃韶三口酌量開放清水太大則三閘俱開中大則開二閘稍大則開一閘水小則全閉務使清口之水常平則船自易行而又不使黃水倒灌則清口之為清口得矣運河口運河口宜在石坎正對處宜建攔水堤一道要數十丈長其河正對口處宜寬廣十數丈上口河宜以漸而窄至口門處又宜以漸而寬其最窄處宜建閘二三座大約不甚著力宜用磚閘下板處用石水大則起板以泄水水小則下板以蓄水運口內雁翅不宜驟寬宜以漸而寬大約每一丈長寬一尺則水流不至太急可無牽挽之難而於石墻上用草連以護之則船無撞衝之虞矣又黃水之所以倒灌運河者亦運河口門正與清口相對所以一經倒灌即入運口其勢甚便也今宜將運河口改於武家墩堤西石坎之東使口門向南則運河口與清口相背自不至有倒灌之虞矣若猶慮其倒灌再將運河口建閘一座若黃水盛大則將天妃閘運河口閘俱下板堵閉黃水又焉得而入乎再將髙家堰各閘俱經下板堵閉則清水既盛而黃水自退矣清河口議運河口直衝清口所以黃水一發勢必倒灌順流而下所以運河盡皆黃水無怪乎運河底淤墊日髙也今宜將現在運河口堵塞並將大墩以西築大壩一道築隔清口却從大壩之南往西開引河一道或里許或二里許轉往北開至堤數丈轉往東開出清口會黃下海却於大墩之東開運河口使淮水由南而北運河口西開清口會黃使淮水亦由南而北則黃水雖發不至倒灌運河矣如仍恐倒灌則於引河極西之處建閘一座如遇黃水盛長則下板堵閉如此則既不能倒灌清口以淤洪澤湖亦不能潛入運河以淤運河矣又再開清口由天妃廟下往東北開引河一道從堤外直往東行或二里或三四里入黃河又於河北楊家莊之上開河口一道使糧船由此口過黃河仍於天妃廟後引河頭間建閘一座如遇黃水倒灌則下板堵水又於運河分水往東處築草壩二三座束水使水不得多入運河蓋恐河不能容必致沖決也此與上條不同又一説也當酌又或曰現今清口寬九十餘丈泄水入黃河今開清口不過數丈耳豈能多泄洪湖之水洪湖之水不能多泄將不虞其泛濫乎豫曰是宜倣張福口王簡口黃韶口之制以備蓄泄則洪湖之水自不至泛濫而運河之水亦常有餘裕矣或曰若運河水大河不能容則如之何豫曰運河之水有餘則開五空橋由檀度寺閘分入運料小河以下海或曰運料小河已多淤塞恐不能下海豫曰能疏通至海口固好即不能至海使其由大茭陵入黃河亦可以泄運河之水况淮安之西又有栁溝河亦可開通灌田且泄運河之水或曰淮安水髙於城若遇泛漲能無慮乎豫曰府城運河之南地最窪下若開月河一道使船由月河而行正河自可無虞也或曰髙寶運河之水若遇泛漲則如之何豫曰東岸有劉均溝子嬰溝涇河澗河人字河鳯凰橋芒稻河皆可泄水也在預先疏濬之耳或曰髙寶湖水若大則如之何豫曰固可由運河東岸以泄入下河亦可視地勢之宜泄之使入江也大挑運河國家數百萬糧漕皆資一線之運河豈可不使之深通哉兩年以來見運河口每苦淺澀而界首一帶如興文閘子嬰溝等處放水灌田則舟苦難行蓄水行舟則民苦無水此豈善全之謀乎故於運河口及界首至揚州一帶宜大為挑濬務使深通而於全河尤宜大挑務使水由地中行而不專借堤以束水則水雖有盛大之時終無泛溢或用河兵分假挑挖每年一次嵗以為常則運河不患其不深總要比現今河底再深二丈則運河乃成雖有水大淮揚不至受害矣再將運河東減水閘壩底低下數尺則河既不淺而水有所歸自無湮沒之患又查運河原舊甚屬深通自數十年來只加築堤岸而不深挑運河以致日淤日淺運河之底或有髙於平地者矣固宜大加深挑使水由地中行庶糧運無阻而民田亦免淹沒之患矣復髙堰各閘壩一周橋翟壩髙良澗古溝之舊制宜復也今查周家橋髙良澗舊河現在聞當日一帶俱係水田今宜將此二處仍各建閘復昔日水田之舊而於髙堰一帶每二十里建閘一座開引河一道兩岸多開溝渠盡成水田而其有餘之水則令其穿運河由涇河澗河及子嬰溝至馬家蕩入蝦鬚溝河由射陽湖入海或曰髙堰一帶多開閘座以泄洪澤湖之水則清口之水不虞太弱而不足以敵黃乎豫曰清口宜收束使小且有上諸閘黃河之水以助之借黃以敵黃又何患其不足乎或曰髙堰一帶及周家橋髙良澗既多開閘座以泄湖水則下河一帶不又苦水乎豫曰下河之所苦者不獨在水也今年不嘗苦旱乎揚州每日禱雨既苦無水而旴泗又苦於多水豫正欲損旴泗之有餘以補揚屬之不足也且所謂閘者固可開可閉操縱在我者也下河用水則開之下河苦水則閉之又何至為下河之患乎或曰下河苦水則閉閘誠是也但子言清口收束使小一洪澤湖之水豈能驟出乎豫曰昔清口之上張福口王簡口黃韶口固嘗建閘矣今再復此三閘之舊以備宣泄未為不可而又何患乎清口之小也夫開周橋一帶閘座以灌田則不特除水之害而兼以資水之利矣開峰山歸仁堤諸閘以泄黃水又開張福王簡等口以泄清水則不特用清以敵黃而兼用黃以敵黃矣似亦法之可行者也髙堰內水利河防一覽曰髙堰之內有越城周家橋一帶地勢稍亢淮水大漲從此溢入白馬湖水消仍為陸地蓋藉此以殺黃漲即黃河之減水壩也若一概築堤非惟髙堰難守即鳯泗不免加漲矣愚意欲於周家橋一帶設立閘座多穿河渠以溉民田則髙堰之堤可保鳯泗之水可消而民間更獲灌溉之利是一舉而三善備也又何憚而不為或曰清口不虞倒灌乎曰湖水小則閉閘以敵黃湖水大則開閘以溉田又何慮乎復周橋翟壩髙良澗古溝舊制黃河既開減水閘涵洞又開支河則水不至於盛大自無倒灌清口之慮矣而洪澤湖水又豈可使之盛大如故哉即以今嵗論之旴泗苦於水大揚州苦於無水借旴泗之水以潤揚州豈不兩全也哉故宜復周橋翟壩髙良澗古溝之舊制使其有餘則泄之不足則蓄之務使各遂其願既不至於無水又不至於苦水豈非一舉而兩得之道乎開周家橋閘余議大挑運河既於臘月十五日閉壩矣然回空糧船將不行乎曰宜開周家橋閘使回空糧船盡出周家橋閘由草字河入髙寶湖至髙郵州入運河即一切民船俱由此行板閘關暫移於周家橋收稅則運河既可大挑糧船亦可通行關稅不至有誤所謂一舉而三善備焉者也髙家堰堤內水田髙家堰內或相去十里或相去十五里或相去二十里開引河一道堰上建閘或涵洞使泄洪澤湖之水即以灌堰內之田引河兩邉盡挖溝渠使通水道以灌民田引河兩岸即以挖河之土築堤則髙寶萬頃湖波盡成稻田矣湖水宜由武家墩入運料小河南行閉六壩孫宗彛曰聞潘總河當日風雨寒暑駕小艇往來訪詢夜不成寐者半年殫力思維乃有成畫是以急築髙堰一帶惟堤淮水使不東注併力出清口敵黃刷黃以入於海一策而已其策髙堰曰泗州巨商私販北自河南南至瓜儀勢必假道清江浦而各閘不免稽留咸以從髙堰周橋一帶直達為利多揮金造浮言以阻我愚按治河别無他法惟有塞髙堰通海口一策而塞髙堰又即所以通海口也然而髙堰之所以難築者則以巨商私販利其往來之便以為漏稅之計也故昔日河道之壞在開周橋今日在開六壩一閉六壩而河道治矣救旴泗法皇上軫念旴泗百姓永受水患乃指示方略令於蔣家壩建閘一座開引河一道以泄湖水法誠善也但洪澤湖水勢甚大非一閘所能宣泄查歷來舊制原有周家橋閘翟家壩並髙良澗古溝二閘以泄湖水所以旴泗不致大受水患今由蔣家壩閘推之再建兩三閘以泄湖水再於髙家堰內多開溝渠以灌民田其有餘之水放入髙寶湖內而又於運河西岸多開㴠洞使髙寶湖內有餘之水放入運河又於運河東岸多開閘壩使運河有餘之水放入下河以灌民田而其有餘者仍令隨各海口下海則髙家堰內以及下河俱可收水之利而旴𣅿泗州亦可除水之害矣或曰洪澤湖水由髙堰而東則黃河之水不虞倒灌清口乎豫曰有收束清口之法在今清河口現寬九十餘丈若髙家堰建一閘則將清口收束一二十丈再建一閘又將清口收束一二十丈再建一閘又將清口收束一二十丈將來清口僅餘數丈使足以通漕運而止清口既小蓄水必盛是足以敵黃而有餘矣又何患黃水之倒灌乎此功一成既可以除旴泗之水患可以興下河之水利並可以免黃河之泛濫誠一舉而三善備焉者也又旴泗之所以苦水者以黃河之水無所泄也駱馬湖之水歸黃河洪澤湖之水盡歸黃河而黃河僅恃一大通口之海口以泄之下源之泄水既少上源之壅水必多洪澤湖之水不能速下此旴泗之所以被害也今日欲救旴泗惟有將黃河分為三河從王家營減水壩開引河一道由鹽河入平望河海口自陶莊引河下尾開引河一道由鹽河歸鮑家營河出五港口下海有此三海口以泄水下源之泄水既多上源之流水自暢且此二支河俱在清口之下如此分泄則清口自無倒灌之虞然後開周橋翟壩髙良澗古溝以泄洪澤湖之水洪澤湖之水所泄既多又慮清口不敢敵黃則於徐州之下清口之上黃河南岸多開減水壩以泄黃水入湖一以助湖水使出清口敵黃一以淤平湖地使滄海變為桑田使洪澤湖仍為洪澤湖餘地盡淤平原而淮河仍復淮河之舊則洪澤湖盡由髙寶湖入運河下江亦可從鳯凰橋人字河下海則旴泗之水可消而揚州一屬亦不至苦於無水灌田矣此法一行而揚州得其利旴泗除其害誠一舉而兩得者也添水利道淮揚百姓常苦水之害而不知資水之利水之大者莫過於洪澤湖委之於無用則足以為害而用之灌田則未嘗不可以為利宜添設水利道一員或即以河道兼攝亦可同知通判則令其兼攝各縣添設水利縣丞或主簿一員令其專管於周橋翟壩髙良澗古溝髙堰武家墩石磡各建石閘一座下各開引河一道挑濬溝渠務使可以灌田而止是資水之利即所以去水之害也運河兩岸減水閘壩運河西岸自淮安至揚州宜多建進水閘壩引湖水入運河濟運若運河水大又宜於東岸多設減水閘壩放運河之水由各支河入海引湖水入河濟運則河水自不患其或小放河水由支河入海則河水又不患其或大矣此誠萬全之策也復運料小河運料小河所以泄五空橋入運河之水也中有蘆蒲一假未經挖通似應挖通以泄運河之水但茭陵一假穿斷遙堤故河院廢之蓋慮黃河之水盛大萬一衝決遙堤堵塞猶堪作內障也今年運河之水甚是危險似宜仍復開通以泄運河有餘之水也復五空橋河五空橋河所以分運河之水以保清江也緣前任董河院開閉不得其法防之不固以致河水流入清江清江被淹而河院董亦以是去位若因是不開此河是因噎而廢食也今宜仍復開通以分運河之水則運河之水自小而民居不致淹沒矣復楊家廟河兼伏龍洞伏龍洞此明時孫知縣所造使穿運河入射陽湖者也其法於運河之下建石涵洞涵洞之上加土四尺上為運河底此法甚善而今已久廢矣故宜復之蓋此河所以泄洪澤湖水而黃河南岸運料小河又所以泄運河之水也今二河並廢髙家堰已建石工運河兩岸惟務加髙而髙堰之險運河之險乃在在告急矣此愚意所以欲復也流均溝流均溝所以泄運河之水入馬家蕩者又自馬家蕩由蝦鬚溝之廟灣入海此河一開則淮安運河之水由此而減不至甚大則淮安可以安枕而卧矣芒稻河芒稻河亦所以泄運河之水入海者也惟開口未盡通所以運河之水每至滿溢堤岸每至沖決惟將此河大為開通庶乎運河之水入海既速而堤岸亦可保無虞或曰海口既多水勢大泄運河不致淺阻乎余曰於河頭或建閘或建壩水大則泄之以入海水小則蓄之以濟運則糧運既可通行而無淺阻之患堤岸亦可保固而無衝決之虞矣王家營開分黃支河宜於王家營大壩開通使深將引河再挖寬深以引黃河之水使入鹽河由平望河下海又要在縷堤之北鹽河之南再挖引河一道使黃水出大壩往東行至鮑營之下乃歸鹽河而於大壩以上一假竟歸鮑家營河則與鮑家營河不至混而為一矣韓家莊閘引河查韓家莊南有運料小河一道宜於尹家莊西築隔堤一道以斷運料小河即於尹家莊開引河一道引黃水入運料小河直至大茭陵將縷堤開通放水仍入黃河則水勢既分而安東縣之南門與便益門及二塘俱可不險而河南之韓家莊尹家莊新港唐家堡周家渡小茭陵大茭陵各險工俱可廢矣尹家莊一帶開引河宜於尹家莊掃工之上開引河一道穿過縷堤使入運料小河而於大茭陵遙堤外開引河一道穿縷堤使運料小河之水仍出黃河此工一成而尹家莊韓家莊安東便益門南門二塘新港唐家堡周家渡小茭陵大茭陵十處險工俱可以不險矣但運料小河南岸之堤宜加幫髙厚仍宜加築堅實始足捍禦而以加幫所取之土仍挖運料小河一道在運料河堤之內以補運料小河以通運料小河上下之水掃工宜廢一黃河兩岸掃工宜廢也除近城近鎮者仍下掃外其餘一應掃工盡行停止查河南從前每年下掃嵗無寧晷臨河州縣民不堪命自佟撫臺到任乃以不治治之坍堤還堤而不下掃三十年來民少休息而河亦無泛濫之虞今惟倣河南之法於各險工之內先築越堤而後廢掃工外靣坦坡要極平堤要髙寬則水之沖刷無力而後將掃工兩頭縷堤先開水口使水得近越堤或曰縷堤外地勢髙縷堤內地勢窪既開水口則縷堤內越堤外不幾成潭乎豫曰不然上開水口則黃河之水由上而入下開水口則黃河之水由下而出且水長一次則地淤一次不數次而縷堤內外可以相平矣又何慮其成潭乎或曰河南地寬江南地窄固未可以一槩論也豫曰江南之地固未嘗窄也亦未嘗無可築越堤之處也惟相其地勢地勢寬者越堤宜逺地勢窄者越堤稍近又何不可之有哉而越堤之築又宜照例實加夯硪乃為有益海嘯或問海嘯之後沙塞其口必預疏濬潘印川先生曰海嘯之説未之前聞愚按海嘯之説自古有之或潘先生偶未之見耳愚於辛巳三月三日親在雲梯關之下見海嘯大通口兩岸水與堤平而馬家港之掃遂復衝去而上流安東之水曾未大漲以是知其為海嘯也然數日之後水復歸漕依舊刷沙至壬午嵗而河底日深海口大闢不惟不能淤塞且日刷日深海口日加深通矣海嘯沙塞未可信也居濟一得卷七
