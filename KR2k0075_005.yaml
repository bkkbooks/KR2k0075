body:
  text: 居濟一得卷五禮部尚書張伯行撰治水治水者使水有所歸而已孟子曰禹疏九河瀹濟漯而注之海即今山東之河是也數年以來迭被水患皆因入海之路淤塞不通故泛溢平野而民田悉受其害也查東昌府舊有減水閘九座皆洩運河有餘之水以入海者也今則閘座廢壊河底墊髙水不能出故常盈溢甚則冲决此必至之勢也土橋閘土橋至梁家鄉止十二里至戴家灣乃三十五里故十二里之水每不足三十五里之用必須土橋放兩閘戴家灣始可放一閘則上下之水俱足而無淺阻之虞矣若照常例一塘灌一塘則土橋以上必致淺阻而難行若土橋放兩次戴家灣水勢仍小即再放一塘是土橋放三塘而戴家灣始放一塘合三塘之水以為一塘之水合三塘之船以為一塘之船而水又焉有不足者乎而船又焉有淺阻者乎又此閘離梁家鄉閘十里離戴家灣閘三十里以十里之水放入三十里塘内故每有淺阻之虞此放船之所以甚難也法宜戴家灣閘上常存船數十隻或百餘隻則此塘之水可以接濟土橋之水土橋放船自無淺阻之患土橋放完然後戴家灣閘啟板將前數十隻或百餘隻盡行放出却將土橋新放下之船存在塘内使土橋再放一漕然後啟板將此船放出又將再放之船存入塘内以接濟後船如此節節放去淺阻之患庶可免矣此土橋放船之的着也戴家灣放船法戴家灣閘上離土橋三十里下離磚板閘四十里乃運河一大關鍵也此處最宜斟酌得宜蓄積有方必先計算船數之多寡水勢之大小或土橋放兩塘此閘放一塘或土橋放一塘此閘放一塘或土橋放一塘半此閘放一塘則土橋三塘可分為此閘二塘要使水勢足用運行無阻乃為盡善然此處放船必酌量磚板閘之水使不大不小盖水大則恐漫溢水小則恐其淺阻必審奪至當使之得宜則既無淺阻之虞亦無漫溢之患矣此閘宜多備板塊若水勢太大則此閘可蓄積倘一放至磚板閘勢不能留矣然此閘放船尤宜多無論磚板閘能出不能出皆宜多放盖外河水小則船難出口而磚板閘以上不可不多存船隻者則以船蓄既多外河水一長即可俱出矣若不先存船數百隻恐外河水一漲即欲放而無船故戴家灣閘放船宜多也又戴家灣閘離磚板閘四十里離土橋閘三十里此閘最關𦂳要啟閉一不如法則七十餘里之塘河未有不致淺阻者故必蓄水既多則放閘之時上下自無淺阻之患若一塘灌一塘蓄水必不能多須土橋放船兩次此閘始可放船一次則蓄水既多而上下皆有餘裕矣或謂土橋放兩閘恐船太多此閘不能放完不知土橋放兩閘其船不過二百餘隻即使三百四百無不可放前者一塘曾經放過民船六百餘隻竝無淺阻又何慮乎磚閘放船法磚閘灌塘必先於板閘多下板塊使水不下洩則無論船之多少皆可灌放而無難若下閘下板太少灌塘之時板閘水已下洩則船必不能多放而上源恐致淺擱惟於磚閘灌塘時板閘多下板塊板閘放船時磚閘多下板塊則水不妄洩而船皆可出口矣或板閘不能放完塘内淺阻或磚閘亮板一塊以接濟之或板閘下板磚閘啟板再灌入數十隻一時開放惟在臨時相機酌奪審時度勢以一心權衡之而已又閘上之水若可以過一百五十隻船者止過一百隻即送㑹牌俟戴家灣再放一塘有水接濟然後再放若放船太多水之消耗已盡則戴家灣閘船恐難放矣此處之水常使有餘無使不足盖一經水小則接濟甚難也又昨見報一塘五十七隻船做三次放一次放船三十隻二次放船二十隻三次放船七隻切思七隻之船而放一漕之水豈不可惜此後如一塘可放完者極好若一塘不能放完做二次放亦可或二次仍不能放完或餘幾隻可將板閘下板磚閘再啟板灌塘另做一漕放如此塘放一次二次不能放完仍有餘剰者即再將板閘下板磚閘再啟板灌塘灌完再放務使水皆有用不致空洩為妙又此閘上水有十四五捺時即送㑹牌令戴家灣閘放船接濟若至十三捺則不可放船矣須候至戴家灣放下船來板閘方可放船予前聞磚板放船每日止三二十隻或十數隻心竊疑之故親來監放每日放至一百二三十隻甚至一百八十五隻乃悟從前之放船極少者以放水之時不放船放船之日已無水也何以言之戴家灣放船之時磚板閘水大之時也磚板閘既不放船而候㑹牌又不多加板塊使水直從板上空過至戴家灣放完船而水亦盡矣㑹牌始至磚閘啟板放船已無水矣况外河水小板閘一啟板水去而船留故放船無多也予力為改之使放水之時即放船放船之日始放水故一日過船至一百八十五隻惟於閘上酌量水勢水將大則亮板以放船水將小則加板以蓄水不過啟閉得宜蓄洩有方而已板閘放船法灌塘之時必使糧船在先民船在後盖民船吃水甚小而糧船吃水甚大若先放民船及至水小糧船不能行矣四月間曾目覩放船每板止放糧船三四隻皆因先放民船甚多也必先放糧船俟糧船淺阻不能出口之時然後放民船盖民船甚輕至糧船不能行而民船猶自易行也如此放去則糧船所放必多矣盖外河之水甚小則閘河之水當如惜金豈可以有用之物而置之無用之地乎外河水小板閘一啟板水洩而船淺擱矣故放船最難也予心竊憂之復設一法於板閘啟板之時將磚閘之板多下滴水不致空洩俟板閘啟完板放船出口視船將淺擱之時即將磚閘之板酌亮一塊或二塊或三塊使足送船出口而止又視糧船可以盡出口閘不致淺擱之時即將磚閘之板依舊嚴下毋使洩水如此則水不空洩而船多得出矣故從前每日止放船三二十隻自予行此法每日出船一百二三十隻甚至一百七八十隻附志於此以備後人之採擇焉又山東四十餘閘放船皆易惟板閘放船獨難盖板閘之下即係外河更無閘以蓄水也而獨外河水小之時放船為尤難盖以板閘一啟板則塘内之水一洩無餘糧船每致淺擱須於磚閘灌塘之時板閘放船之時磚閘多下板塊無使水勢下洩直至塘内淺阻不能出口然後亮磚閘板一塊或二塊以接濟之然又不可待其既淺而後亮板也既淺而後亮板則糧船一時恐難行動須於將淺之時即行亮板如放二十隻後始淺則放至十五隻時即行亮板則水足接濟到底不淺矣然必磚閘板閘多下板塊上源蓄水盛滿然後可行不然上源無水恐板亦難亮矣板閘板閘底壊漏水所以從前東昌一帶糧運淺阻予於甲申乙酉桃河時將閘底修好至今再不淺阻如再淺阻必閘官閘夫啟板誤漕不可以不察也閘官磚板二閘一官荆門上下一官天井在城二閘亦止可用一官上新中新二閘既廢其夫亦可不設竹薄壩板閘放船之法用核桃粗竹竿照依秫稭薄様用單線好蔴繩織成薄根朝下者削尖比他竹竿長五寸每三尺逺用木杉篙一根兩頭刮一般粗下亦削尖於西橋上里許河淺處所兩岸築土壩壩土用竹薄攔河展開竹竿杉篙俱釘入河底杉篙項上用繩留住於竹壩未做之先先將西浮橋對𦂳上鎻橋上用土布袋數十壓船下水上止留一二捺浮水上則此橋已足堵水又於橋上存重載民船百餘隻令各擺開則此船又足堵水再於船南竹薄壩堵水上靣如再有重載船亦令擺開堵水則水不能下而板閘之内外自不至於淺阻矣治河之法治河之法有宜酌復古制者焉有宜隨時變通者焉何言乎古制之當復也運河兩岸之進水閘減水閘是也古人既開㑹通河以濟運矣又慮其水之有時而涸也於是多設進水閘以助之或湖水或坡水或河水務使皆得入運以濟河水之不足所以雖逢天旱之年而河水不苦於涸竭者恃有此也築漳河壩引漳水濟運外河水大則板閘之船易於出口若外河水小板閘之船出口甚難須於魏河漳河築壩使水由支河經元城館陶而入衛河則外河之水自然有餘而無淺阻之患矣但魏縣元城係大名府轄非山東之官所可専行須預先詳眀河院使行文大名道則事無不濟矣但漳河之水小時固足為運河之利而一經漲發又恐為元城館陶之害須於重運到臨清時將漳河築壩引水入衛濟運至重運過完仍將漳河壩開通將入衛支河堵塞則元城館陶俱不受害矣引漳入衛衛河之水發源於河南輝縣之百門泉源逺而流長及至臨清其流漸細以故北河一帶每遇天道亢旱糧船不無淺阻查清河縣東北漳河去衛河僅十餘里有舊河一道名曰蔡河康熈四十二年大水時曾由此入衛河後被武城堵塞若疏通成河使漳河之水由武城縣西關北頭引入衛河則北河一帶可永無淺阻之患若慮伏秋之時二水交發其勢太大查恩縣四女祠北減水閘下原有引河一道今宜疏通寛深使水由古黄河下海則運道民生均受其利矣又漳河發源雖有清漳濁漳之分然東支西𣲖總合流於河南彰徳府之合彰村由合彰而下注於東省之邱縣城濠分為二股其一自城北分流經廣宗鉅鹿諸邑向西北至寧晉之大陸澤㑹滹沱釡陽諸水由天津入海其勢浩大即不長水亦可舟楫通行今勿論也其一自城東分流經威縣南宮清河武城各村莊向東北亦由天津入海名清陽江又名黄路河對清河之沙土村有蔡河一道接黄路河之水可以入衛濟運惟是蔡河雖有河形現今無水地勢髙於黃路河五六尺不等自張寛村俱係民間承糧之地延袤二十餘里至武城之北三官廟方可引入運河若將蔡河挖掘深通引之濟運無論壊民田無數萬難開挖即使開挖成河則黄路河現今水小之時尚寛至二三丈五六丈之處不等一經水發汹湧浩瀚其勢莫當恐一線之運河不能承受反有冲决之患且止可濟武城以北之淺而武城以南之淺處尚多亦必不能使水逆流而上以濟之也查直𨽻之成安縣栢寺營有通漳河之新河一道直至山東館陶之沙河即古之所名馬頰河者綿長一百二十餘里寛自一丈七八尺至二丈四五尺不等深自一丈七八尺至二尺四五寸不等獨至沙河因其淤成一片沙坡故接新河之水止有涓涓一滴入衛惟無河身不能束水所以不暢若將沙河挑挖使有河身束水則漳河之水混混而暢流入衞矣漳水入衞既暢則衞水盛衞水盛則外河之水靣自髙閘河之水亦不致建瓴而下而臨清迤北各州縣古淺之處不事疏浚而自無阻滯之慮矣且漳水既分入衛則直屬成安廣平諸邑沿河村莊禆益正復不淺運道民生均為有益衛河衛河舊名御河源出河南輝縣蘓門山東北㑹洪漳諸水過臨漳分流為二其一北出經大名至武邑以入滹沱其一東流經大名東北出臨清合㑹通河至直沽㑹白河入海愚按臨清以北運河每有淺阻此河既至臨漳分流為二若遇臨清迤北水小之時將臨漳分流處其北出入滹沱者堵閉則東流出臨清合㑹通河者水自大矣再將武城蔡河開通又何水小之足患乎四女寺進水閘四女寺進水閘所以洩民田之水入運河者也今已廢壊無存閘内引河亦皆淤墊故民田之水不能洩出百姓每受淹没之患查此閘原係恩縣知縣孫居相修建今日山東河工不動錢糧此等工費勢無所出若為民父母者肻為民除害則用本縣之民力救本縣之百姓當亦人情所欣然者亦何憚而不為哉四女寺減水閘四女寺北舊有減水閘一座原所以洩運河有餘之水者也運河有餘之水從此洩出則上不致為害於山東下亦不致為害於北直此古制之最善者也乃數百年來閘座廢壊不修引河淤塞已平運河之水無處宣洩泛溢於南則山東受其害泛濫於北則北直之吳橋東光等處悉受其害此固不可以不復者也然閘座之復猶易而引河之復甚難盖引河久已淤平百姓悉皆佃穜今欲仍挑為河此人情所甚難者故必照原舊河身挑挖則人亦無辭但工程浩大費無所出此工一成併有益於北直若北直之吳橋東光及天津一帶州縣肻相幇助則亦何難之有哉急修閘座東省河道設有四十四閘節宣水利以濟糧運原係上下完固水不滲漏方克有濟但查勘沿河閘座有創建數百年亦有重修數十年者閘墻閘底處處過水并閘底之萬年枋損壞者甚多雖有閘座之名竝無蓄水之實應飭各州縣乘閉壩挑河得以見底各將管下閘座上下築壩掣水查勘閘底有缺石者添補石塊萬年枋損壞者作速添換修理完固其有隙縫以及閘墻隙縫過水者湏用木板實塞其小隙縫用油灰蔴穣照依艌船之法修艌堅實其縫上下脗合庶水不致走洩得以蓄積則於糧運大有攸頼矣東省湖閘情形余効力河工有年䝉恩補授濟寜道任事以來氷兢自矢留心體察期報主恩而答知遇今閲臺臣樊一疏爲請陳東省湖閘情形等事余不能無辨焉㨿疏稱查運河脩工始於戴村壩引汶水一支由東平而南逓汶邑西以抵南旺即分水龍王廟等語查永樂九年宋尚書用白英計分水南旺築壩戴村横遏汶水南流會通河始得濟運每水潦則掘坎河口以殺之不足則開滚水壩又不足則開減水諸閘或順之入海以披其勢或蓄之入湖以納其流水微則盡塞使餘波悉歸於漕此戴村壩所由來也旣築壩戴村遏汶水入海者注之南旺水無旁洩留坎河口不壩以備分洩入海每重運過時用刮沙板作一沙壩於坎河口涓滴盡趨南旺若水長則連沙衝出坎河後河身漸移近坎河口全河之水直灌坎口故土壩歲築歲决每歲勞費不貲且全流漫衍而入鹽河南旺每至膠舟萬厯初侍郎萬恭叠石爲灘十七年總河潘季馴築石壩四十丈髙三尺水髙於壩漫而西出漕無溢也水卑於壩順流而南漕無涸也二十一年水大發尚書舒應龍又於河口之下開渠洩水故於兩旁各築石堰以防衝刷當石壩未築之先主事佘毅中議建石閘略云欲爲經乆之計莫若連建數閘以時蓄洩如堽城閘之制蓋堽城可閘則坎河亦可閘也其後主事張文竒又議仍築土壩略曰坎河旣决一俟霜降後即當仍舊歲築土壩計每歲之費大約不踰百金且水直衝坎河則上源之勢旣殺而下源之勢稍微王堂諸口不致盡决汶邑民田得免淹没以利害計雖歲有數十金之費利倍於害矣夫以佘毅中言之則當建石閘此一勞永逸之計也以張文竒言之則宜仍歲築土壩此補偏救弊之說也建石閘則工大而費繁築土壩則力省而較易然近日東平汶上之所以被水者以石灘石壩僅百丈耳夫以汶水全河之勢而恃此百丈之壩以洩之且過三尺而始洩之石壩旣窄土壩又髙所以蓄水旣髙則汶上被淹及其冲决坎河則驟水所經而東平亦被淹所謂川壅而潰所傷必多也爲今之計建石閘則酌奪啟閉固属萬全即歲築土壩亦無不可獨是築土壩宜凖石壩之制而稍髙尺許使水小之時則全蓄以濟運水大之時則任其冲决一俟水落或霜降後即爲修築庶汶上東平兩不受害矣或曰爲汶上計則得矣東平以百丈之壩而猶不免於淹没今曰土壩凖石壩之制水大則任其冲决東平之受害不更甚乎予曰不然東平之所以受害者以土壩旣髙蓄水日盛一經冲决則驟水所經而民田乃被其害也若曰土壩卑則東平被淹然當日未分水南旺之時全汶之水盡由鹽河下海亦未聞東平之受害若何也今南旺旣分一半而東平又慮其淹無是理也此戴村壩坎河口之大較也㨿疏稱又恐汶水一支不足濟運爰𨗳諸泉使之同歸於運河然孟冬挑淺汶無所注仲春重運河無所資終未盡善再查運河之東有二湖北曰馬踏南曰蜀山皆在汶邑境内所以停蓄諸水漕艘備至則次第開放以濟運道之不足土人名曰水櫃運河之西有湖一區名曰南旺亦在汶邑境内挑淺則由斗門撒水以入於湖或河水湧溢則開斗門洩水亦歸於湖此固其大槩等語但旣曰孟冬挑淺汶無所注而又曰有馬踏蜀山二湖所以停蓄諸水非汶之所注乎旣曰仲春重運河無所資而又曰漕艘備至則次第開放以濟運道之不足非即河之所資乎㨿疏稱從来雨澤水勢常不足於冬春而盛於秋夏故於秋夏之交汶水迅發勢如黄淮兼之泉流合聚諸泉汹湧携汶勢而竝注於湖湖不能容因而洋溢民田罹災等語查南旺之北原有何家滚水石壩又有王堂口水大則從此洩入石頭口等處入運河是旣有以濟北運而南亦不至於泛濫也蓋南旺以南如馬塲湖府河泗河硯瓦溝磨䥥溝蜀山湖南陽湖昭陽湖微山湖彭口大泛口其餘諸泉不可勝數濟運之水不患其少也南旺以北舊止有安山一湖而今盡成民田張秋以南沙河一道棗林河一道亦係濟運而今盡行淤塞是南旺以北無涓滴之水以濟運也有餘之水宜洩於北而不宜洩於南者也爲今之計何家石壩當爲修整王堂口宜建石閘一座伏秋遇汶水盛大則開放以洩之春夏之交遇運河水小則開放以濟北運蓋重運一過南旺則栁林閘嚴行封閉使南旺蜀山馬踏三湖之水由龍王廟往北而汶河之水由王堂口往北入運則南旺以北之運河自無膠舟之患矣㨿疏稱昔人計出萬全於蜀山湖之南置滚水壩於南旺湖之西南建忙生閘遇水勢泛漲越滚水壩以達濟寜之西湖由西湖以入於河自河以入於南旺湖湖滿水溢則開忙生閘入牛頭河歴南陽等處下抵海口其時流順瀾安運通而民田無恙等語夫曰越滚水壩以達濟寜之西湖由西湖以入於河其說是矣又曰由河以入於南旺湖夫西湖之十里閘安居閘皆入運河者也其去南旺尚有五六十里不知何以能逆流而上以入於南旺湖也此余之所不觧者也㨿疏稱後世不師古人懐私自利髙築滚水壩蜀山之水無出路堵塞忙生閘南旺之水無所洩等語查滚水壩雖髙築而利運閘已建蜀山湖之水未嘗無出路也忙生閘雖經堵塞而十字河已經開通南旺湖之水未嘗無所洩也但堵何家石壩王堂諸口使水涓滴不向北流而又建利運閘以放蜀山湖水開十字河以放南旺湖水使水盡往南行此則運河㕔任同知之懐私自利也蓋南旺以南爲運河㕔之境而南旺以北則漸至捕河㕔境止顧一已不顧他人止顧一境不慮全河運河同知任璣誠有不能辭其責者矣㨿疏稱湖水猛溢蜀山之北如平原顔氏次邱及汶城東北一帶村落南旺之西北如宋家窪大屯小屯一帶屯莊盡行淹没雖數日之内水順河下不致乆停然近湖之地如宋家等窪民田數千百頃至今二十餘年汪洋浩瀚無一可施犁鋤等語查平原次邱俱在汶邑之西南而其所以被淹者以何家石壩堵塞王堂諸口不能洩水水不北行自必向南矣水盡南行此其所以被淹也而顔氏一村又與宋家窪等屯俱在汶邑之西南宋家窪等處之所以被淹者以南旺湖堤二十餘年不經脩補故也余自到任後每日讀治河書以考古人之成法又朝夕奔走河干以驗今日之形勢知宋家窪之所以被淹者皆由於南旺湖堤之不修夫南旺湖堤舊係民修今嵗見百姓災荒故令運河㕔蘓稷督汶上縣主簿劉聲浩率淺夫於今春已經脩補完竣宋家窪一帶之紳衿士民於今夏又經加髙加寛而南旺湖之水已不得過宋家窪二十餘年不施犁鋤之地已漸畊種殆盡矣使早修湖堤又何至淹没二十餘年乎湖堤一修不惟宋家窪不受湖水之淹即使開忙生閘亦不能洩宋家窪之水矣數年以來宋家窪之水所以大者又有故查南旺湖原有關家大閘口在十里閘下又有五里舖滚水石壩在關家大閘之下皆洩南旺湖之水以濟北運者也數十年關家大閘已廢壊無存矣五里舗滚水壩又經堵塞矣此二處不能洩水而乃開十字河使南旺以北每逢天旱之年處處膠舟而南旺以南無論旱潦處處淹没二十餘年不得畊種如宋家窪濟寜南鄉魚臺沛縣滕縣各處又何止數千頃哉自今歲閉利運閘堵十字河嚴下栁林閘板盡啟十里閘板開新河頭使水盡向北行所以宋家窪濟寜南鄉魚臺滕縣沛縣各處俱經畊種而南旺以北重運亦得遄行竝無淺阻之患矣且又令疏關家大閘引河竝令疏五里舗滚水石壩引河將來仍開關家大閘滚水石壩使南旺湖水仍向北行出兼濟閘濟運而忙生閘無容議開矣且宋家窪之水又自有出路查宋家窪以北原有引河一道由開河閘下兼濟閘入河旣得以濟北河之運又以洩民田之水今俱經淤塞已飭令運河㕔及汶上縣主簿勸諭一帶鄉民照舊開通是宋家窪之水古人原有定制特後人未之遵行耳㨿疏稱曩經具詳指畫區處同濟寜嘉祥會勘無如行而復止飾爲時移勢易陵谷變遷之說謂事可行於古而不可行於今夫自古迄今水性有不就下者乎况忙生閘乃牛頭河之北口自前運河㕔任璣堵閘令淺夫多收埽草遂將忙生閘堵塞水道不行漸至壅阻等語夫濟寜嘉祥之受水猶之汶邑也汶邑之水南下濟寜嘉祥先受其害在汶邑顧汶上之百姓而濟寜有不顧濟寜之百姓嘉祥有不顧嘉祥之百姓者乎其爲愛養百姓而欲救之無以異也且忙生之建置徧查諸書無可復考想任璣之意豈不以運河關係重大在昔日由牛頭河行運開忙生閘所以濟運今牛頭河旣不行運故將忙生閘堵閉開十字河放湖水入河以濟今運此亦爲運道計而非必有他意也但不知南旺湖之水宜開關家大閘五里舗滚水壩以濟北運而不當開十字河以濟南運使南旺以南一帶之民田受淹也何也南運原未嘗缺水也㨿疏稱疏浚牛頭一河疏浚之事亦不過令沿河有田之民髙者平之水草芟之湖水一洩隨河而南則湖河不致倒溢民田不致淹没等語查前會題疏内原令地方官各縣修築各縣堤岸疏浚各縣河道牛頭河竝未嘗令其不行疏浚也今宜再行嚴飭地方官令沿河有田之民速爲疏浚無致再淹民田如有抗玩指名掲報恭處庶各州縣亦勇於任事而無敢推諉者矣㨿疏稱山東撫臣彚題兩閘一開濟寜之水一洩無餘抑何其言之不經也且閘所以司啟閉備蓄洩也水少則蓄而閉之水多則宣而洩之蓄洩因時啟閉由人何至一洩無餘等語查宋尚書挑河之始原深三尺數百年來河底漸淤加以堤土淋漓運河之底髙於牛頭河底一洩無餘又何足怪乎若曰閘所以司啟閉備蓄洩也水少則蓄水多則洩是矣但司啟閉者亦必有官備蓄洩者亦必有人信如是也則閘官閘夫又當添設不多此一費乎且南旺湖往北旣有關家大閘又有五里舗滚水壩濟北運往南又有十字河放水濟南運今必欲開忙生閘將閉十字河而不濟南運乎况一開一閉不又多此一畨改更之勞乎無論其不必更改也即使開忙生閘洩盡南旺湖之水旣有妨於漕運果何益於百姓且失百姓魚藕菱蒲之利矣况南旺爲四大水櫃之一原係蓄水之所今不用以蓄水而使之出忙生閘入牛頭河則以有用之水置之無用之地且驟水所經牛頭兩岸如嘉祥濟寜魚臺之民田受害將無窮也即曰牛頭河之水原有南陽湖昭陽湖入微山湖下抵海口獨不思徐州以西九十里無堤岸伏秋水漲漫入微山湖且將逆流而上逼微山湖水使往北行而牛頭河之水又安能獨向南行乎是開忙生閘徒見其有害而未知利之何從也㨿疏稱如督撫所題使兩閘永塞諸邑永困非所以安民生而利運道也伏祈敕諭撫臣河臣再爲秉公細查思當日所以設閘之意竝訪後來閉閘之害如其按形查情則必復滚水壩開忙生閘浚牛頭河以利運道者利民生等語查泉河史云忙生閘係洩湖水入永通閘牛頭河由魚沛運河而下者近年魚沛水盛南洩不多常苦滙積濟寜東南之境是在當日已淹濟寜矣且開忙生閘亦止可以洩南旺湖水而不能洩宋家窪水蓋湖堤間隔宋家窪水固不能入南旺湖又何由而出忙生閘乎若夫馮家滚水壩前此之所以開後此之所以閉皆非無故也查馬場湖原受蜀山湖之水故開馮家壩引水東流又於馬場湖東五里營建湖堤一道以禦之又於五里營西建閘一座十里舗建閘一座安居建閘一座放水濟運是馬場湖原受蜀山湖之水而不受泗河之水矣泗河之水原由楊家壩至蓮亭門前入河濟運楊家壩在濟寜州城東泗河之水貫兖州西流合洸水同經此口南入運道原未嘗設壩正徳間因劉寵之亂築壩引水西繞以爲濟城外䕶始有壩基自明季崇禎十七年流㓂猖獗東省震動於是復築此壩障水䕶城至今未改泗洸之水爲此壩所遏由夏家橋入馬場湖濟運後又將馮家滚水壩堵築使蜀山湖之水不至馬場湖自此以後馬場湖止受泗河之水而不受蜀山湖之水矣數十年來府河淤塞泗河之水亦不能至馬場湖湖地盡皆涸出奸民俱經盗種矣故在今日宜將馮家滚水壩西另建蜀山湖堤一道以禦蜀山湖之水再將府河大加疏通使依舊寛深兩岸築堤束水引水至馬場湖又將馬場湖西至馮家壩之舊河大加開通引水至馮家壩又將馮家壩改閘一座外挑引河一道放水至大長溝西頭入河濟運再將獲麟古渡建閘一座蓋獲麟古渡即今之大長溝擺渡口是也蓋昔日馬場湖受蜀山湖之水水從西來故宜由安居閘十里舗閘五里營閘放水濟運今馬場湖不受蜀山湖之水而受泗河之水故不宜由五里營閘十里閘安居閘放水濟運而宜由馮家滚水壩至大長溝西頭入河濟運如此則泗河之水始得以濟運而不至置之無用之地矣泗河之水旣出以濟運則南運不患水少而汶河之水口又不宜在南旺而宜改於五里舗水口旣改使汶河之水由湖入河運河不至淤墊可以不必挑挖即使挑挖兩岸平坦施功甚易亦不至如南旺兩岸如山工夫百倍也如此則用泗河之水以濟南運用汶河之水以濟北運濟寜以南旣可免淹没之患而東昌一帶亦不至有淺阻之虞此誠萬全之策也馮家壩所以障蜀山湖水是滚水壩所以洩蜀山湖有餘之水者也若任璣所建之利運閘則竝蜀山湖底之水而亦洩之是知用利運閘則洩水太多而有妨於運開滚水壩則蓄洩得宜而有禆於運故宜將利運閘永行堵塞重修滚水壩使水由大長溝西頭入運以備蓄洩此古制之不可以不酌復者也㨿疏稱南旺湖洩運河之湧盛非蓄水以備用湖心髙於何身湖水即洩何渉於河又何至有妨於濟運之水等語查宋尚書經理運河旣成而又恐泉水不足設四水櫃以濟之在汶上曰南旺湖在濟寜曰馬場湖在東平曰安山湖在沛縣曰昭陽湖此四大水櫃也即以南旺湖言之十里閘下有關家大閘所以放水濟北運者也再下有五里舗滚水壩亦所以放水濟北運者也南有濟運閘所以放水濟南運者也載在河防一覽河圖中及全河備考河圖中昭昭可㨿謂無渉於河可乎謂無妨於濟運之水可乎今但開河家滚水壩王堂口使水往北行而南且不淹矣且開馬踏湖之新河頭𢎞仁橋以洩馬踏湖之水而蜀山湖之水亦可由馬踏湖而洩總之爲民生計而忙生閘不當開爲運道計而忙生閘愈不當開若曰汶上被淹獨不思雨潦之年濟寜魚臺皆不免淹没之患何獨汶上乎然而南旺以南每苦於民田之淹没南旺以北每苦於膠舟之難行者則又有故查宋尚書分水原係徃南三分今則往南七分矣而又開利運閘以放蜀山湖之水又開十字河以放南旺湖之水南旺以南焉得而不淹乎原係往北七分而今則往北三分矣又將關家大閘五里舗滚水壩堵築南旺之水不能濟北運也又將𢎞仁橋新河頭閉塞馬踏湖之水不能濟北運也南旺以北又安得而不淺阻乎今新河頭已開𢎞仁橋已疏通關家大閘引河現在疏通矣五里舗滚水壩亦將開放矣如此則南自不至淹没北自不苦於膠舟諸邑又何至於永困乎然而諸邑之所以連年被水者又自有故查尚書宋禮聴用白英之計改河南旺嗣後以微過䝉督責方以儒巾治事未㡬奉命取材川蜀間其一二未竟之緒至平江伯陳瑄始續成之是則宋尚書之改河原未竟也查舊運河引汶水一支出堽城閘由洸河入濟寜始得濟運而於堽城閘下建堽城壩一道中留七空如閘制然亦係下板遇冬春之際汶河之水俱係清流閉堽城壩開堽城閘引清水濟運一遇夏秋之交山水泛漲沙隨水行則閉堽城閘開堽城壩使濁水向鹽河下海洸河不至淤墊而濟寜塘河未聞歲歲挑挖也此古人之制度盡善盡美無復遺憾者使宋尚書得終其事改河旣完自必倣堽城壩之制以建戴村壩倣堽城閘之制以建戴村閘南旺運河分水口上流亦如洸河之制止納清流而不納濁流則南旺塘河沙不得淤亦可免歲歲大小挑之費矣無奈改河未成隨以微過蒙督責以儒巾治事未幾隨去而平江伯陳瑄又不求其盡善遂貽後世無窮之害雖萬恭壘石爲灘潘季馴築石爲壩總不出馬之貞之所逆料至今日馬之貞之言不幸而中焉者也爲今之計惟有坎河口石壩之下將戴村壩北頭倣堽城壩之制亦留七空如閘制然現今汶河俱是流沙不能建閘可於東岸擇土性堅實之處倣堽城閘之制建閘三座即於南北各開引河一道使水由閘而行然後將往南旺之汶河築土壩以堵之遇冬春水小之際閉壩開閘納清以濟運如伏秋山水大發之時則閉閘開壩放濁流以入海則南旺之塘河止納清流而不納濁水自不至於淤墊矣即曰分水口以上現今河淤勢必歸塘河一時不能免於挑挖然而用工亦少矣是萬世之利也或曰今兩河分流而東平仍歲受水患若將戴村建閘遇河水大發將閘嚴閉使水盡由鹽河下海東平州不更虞淹没乎獨不思古時未有堽城閘未有洸河之先汶水盡由鹽河下海東平州何以不淹也未有分水南旺之前汶水盡由鹽河下海東平州又何以不淹乎然而東平之所以被水者亦有故河底沙淤日髙而鹽河兩涯又無堤岸此其所以被淹也今惟添築鹽河兩岸堤工而又加幇汶河兩岸堤工則水有所束諸邑俱可以不淹矣此又一勞永逸之法也居濟一得卷五
