body:
  text: 居濟一得卷三禮部尚書張伯行撰十字河十字河不可輕開蓋南旺湖水原蓄以濟北運者也若南運水小需用南旺湖水亦必待金口壩黒風口五里營閘十里舖閘安居閘並楊家壩盡皆開放而水仍不足以濟運然後開十字河十字河既開須俟重運一過南旺即行堵閉蓋南水之入海既逺而中間之水如彭口大泛口徐塘口之入運河者又多且兼以獨山湖南陽湖昭陽湖㣲山湖各處之水滙流入運河以達海運河既小宣洩不及勢必泛溢民田此十字河之必不可開蓋恐其助南行之水而為虐也古人分水三分往南良有故也汶河汶河源出山東萊蕪縣原山之隂一由本縣寨子村一出太山之陽仙臺嶺三水俱名汶至靜封鎮合流經泰安州寧陽縣分為二一自東平州戴村壩西南流至汶上縣㑹白馬河鵝河凡八十里南北流號為分龍口一自寧陽縣堽城壩西南流合泗沂二水凡一百餘里至濟寧州南天井閘東合分水南流之汶汶河口宜以南旺分水改為汶河口専往北行不分水於南則北河之水自足濟運矣如糧船盛行水不足用則酌量出蜀山湖水以助之如再不足則宜開洪仁橋放馬踏湖水以助之則北河一帶之水自無不足之患矣又汶河口宜改於分水龍王廟之北十里五里舖滚水壩對過専濟北運則東昌一帶自無淺阻之患矣汶河口既改於滚水壩之對過則滚水壩之南北仍宜各建閘一座以洩運河有餘之水入南旺湖蓄以濟運又南河水小之時先開安居閘如水再小方可開十里閘如遇天旱之年北河水小南旺塘内及開河塘内不得存船以致壅蔽水勢不得暢流汶河中閘汶河中閘之板當視分水口之誌樁以為啟閉如運河五尺水足以濟運則止用五尺水過五尺則酌量下板使水至五尺則止不足五尺則酌量起板使水至五尺而止如中閘下板則將東西二斗門啟板收水入湖俟中閘啟板之時仍將二斗門閉板毋洩湖水如中間之板全啟運河水猶不足用則將斗門酌量啟板放出湖水接濟足用即止不可過洩蓋湖中之水常使有餘毋使不足也汶河堤岸汶河之水發源於松山之麓及新泰萊蕪至汶上而河始大故每逢水長則汶上先受其害今宜於汶河兩岸加築堤岸則汶河水長庶不至於渰沒矣築汶河堤岸康熙四十一二兩年寧陽汶上濟寧滋陽魚臺滕縣嶧縣及江南之沛縣徐州邳州連遭水患者皆由於汶河堤岸不修之故也查寧陽汶河南岸有石梁口最稱險要歴來各州縣被水皆由於此至四十一二兩年為害更烈而汶河南岸之冲決者又不止石梁一口也又有桑家等口俱經冲決所以淹沒之慘較往年而倍甚余於九月間親往查勘見堤工甚是單薄且係頂冲而離堤數十丈内有髙阜之地可以加築越堤又見石梁口上下堤岸殘缺甚多若於石梁口内添築越堤再於桑家等口堵築堅固又於沿河一帶堤岸加幇髙厚不惟寧陽不受水災而汶上濟寧滋陽魚臺滕縣嶧縣及江南之沛縣徐州邳州俱蒙寧陽之福矣蓋石梁等口一開先淹寧陽次及濟寧滋陽汶上漸至魚臺滕縣嶧縣而並及於江南之沛縣徐州邳州是此十數州縣之被淹皆由於寧陽石梁等口之沖決也夫堵築石梁等口加幇汶河堤岸非有浩大工程難以奏績也為功甚少而造福無窮從前皆因循悞事逮至冲決十數州縣被淹之後始行堵築則何益矣應批行藩司轉行各府縣將石梁口加修越堤桑家等口堵築堅固沿河堤岸加幇髙厚並嚴飭汶上縣令其照依寧陽加幇汶上堤岸庶水不為害而寧陽汶上濟寧滋陽等十數州縣之民均免淹沒之患矣修泗汶堤濟寧一帶叠罹水災皆由泗河汶河堤岸不修之故㨿濟寧州北鄉鄉約張永爵禀稱黒風口迤北汶河一帶堤岸殘缺每逢水漲不能捍禦以致泛濫淹沒民田等語余查勘得實飭縣將黒風口迤北泗河汶河殘缺堤岸多集人夫星夜修築一律髙厚嗣後伏秋水發不至沖漫淹害民田矣飭修湖堤官湖之設各有圏築湖堤以蓄水勢秋雨稀少湖河無水是以閉金口壩𨗳水歸入馬塲湖廣為蓄儲以濟來歳重運誠恐湖堤不修水勢傍洩淹沒民田且妨来歳新漕應飭地方官凡有殘缺之處立督人夫星夜修築務使湖水廣積勿令傍溢走洩水利再將南旺湖堤殘缺卑薄者催令修築一律堅平採割湖草湖産之草因壩工修堤需用往例放夫採割但所需夫役人等豈得藉稱官物攔阻小民且搶奪民草有悖山林川澤與民共之之大義也應嚴行禁止聽民採取分水口上建閘山東之運河不知壊於何年乃至今日而敝極矣夫以一千二百餘里之河而總以南旺分水口為闗鍵宋尚書白老人不知幾經籌畫而始定為規制其三分往南者有利運閘安居閘十里閘五里營閘及府河洸河泗河及硯瓦溝磨鏈溝以相接濟而又有獨山湖南陽湖昭陽湖㣲山湖以助之且以下八閘每閘俱有泉源此所以三分往南而不患乎水少也其七分往北者以止有安山一湖相接濟乃今並安山湖而亦廢之其下有戴家廟之三空橋沙灣之五空橋東昌之減水閘九座皆洩運河之水由鹽河以達海者也此所以七分往北而不患乎水多也不知起於何人始自何年竟改為三分往北七分往南惟其三分往北故每遇天旱之年七級土橋一帶在在淺阻惟其七分往南故每遇雨潦之年濟寧魚臺一帶竟成巨浸田禾淹沒一空百姓日受其害而不知誰實為之也今欲修復舊制仍使三分往南則馬塲湖不可以不復也濟寧一帶之長河不可以不挑也仍使七分往北則戴家廟之三空橋沙灣之五空橋東昌府之減水閘九座皆不可以不復其故也此其大畧也其中之細㣲曲折不可枚舉如南旺分水口之上汶河應設石閘三座中為汶河左右二閘一通馬踏湖一通蜀山湖平時則中閘常開左右二閘盡閉放水入運一遇洪水泛漲則中閘下板左右二閘盡啟使泥沙隨水入湖大挑始為省力余讀全河備考乃知此成化年間舊制前人笪東光曾議復之也不覺嘆古人之先得我心也挑濬月河一先期挑濬月河南旺舊例兩年一大挑築壩斷流不通舟楫始開月河官民稱便欲挑正河必先挑月河一時兩役並興夫多苦累時廹則工必畧工畧則沙必淤自萬歴十八年挑正河為大挑十九年挑月河為小挑以為著為定䂓而舟楫往返既不阻於稽緩夫役用工亦不病於煩難矣大壩口大壩口所以節宣運河之水者也運河之水不足則將大壩口開寛小壩口堵塞使汶河之水盡出濟運若運河之水有餘則將大壩口收束使窄將小壩口開通收汶口有餘之水入蜀山湖蓄以待用總酌量運河之水足用而止以為大壩口之寛窄無使不足亦無使有餘老壩口老壩口舊在徐建口之下壩下係大挑之工不知始自何年竟改築於王士義口之下以致王士義口之上至徐建口一叚並不挑挖殊非大挑之意今應仍築於徐建口之下自大壩至分水口一叚遇大挑年照舊挑挖庶塘河不至淤墊而大挑之工較省矣小壩口小壩口所以致汶河有餘之水入蜀山湖蓄以待用者也汶水小則堵塞此口令汶水盡出大壩口以濟運汶水大則將大壩口酌量收束小壩口開放使運河水足運而止餘者盡由小壩口入蜀山湖俟汶水小時仍行堵塞宜建小閘一座以備蓄洩更為妥當胡家樓口此處宜建石閘一座若汶水大發則啟板使水由此直入蜀山湖中若蜀山湖水大則開南月河口及林家村口使出汶河口由五斗門入南旺湖中若湖水仍大則開利運閘使水由三斗門入南旺湖中則胡家樓口之上自可無淹沒之患矣何家壩宜將石壩改閘一座北運水小可以開放接濟汶河水發亦可分洩蓄積其用與王堂口等王堂口王堂口宜建石閘一座北運水小時則啟板從此放水接濟北運如南旺水小則開蜀山湖口以助之若汶河水發亦可啟板從此分洩蓄之沙河棗林河内若安山湖復設亦可蓄之安山湖内戴村壩戴村壩以下宜築草壩四五處束水南流則南旺運河之水自不至於漫溢而為南北數十州縣之害草壩之上搭橋以便行人而渡船亦可不設矣更有一法將戴村壩下用土實築壩一道以攔正河却於東岸建閘或三座或四座若挑引河使水由閘而南則汶上各縣不致湮沒而閘亦可啟可閉以備蓄洩漕運民田均有賴矣又予問人曰戴村壩既決而後淹歟抑不決而即淹歟如其不決而即淹也髙築土壩良是也如其既決而後淹也是土壩太髙之過也或曰土壩髙而東平猶淹土壩卑而東平不更淹乎予曰不然當未分水南旺之時東平州何以不淹也以其水有所歸也又戴村壩尚書宋禮未竟之功也元人引汶水由堽城至濟寧濟運故於汶河建堽城壩以蓄水又於汶河南岸建堽城閘引水至濟寧濟運故當冬春水小之時則閉堽城壩開堽城閘引水入運又係清水河不得淤及至伏秋水漲之時又係混水帶有泥沙則閉堽城閘開堽城壩洩水入海而運河不致泛濫制誠善也迨明季尚書宋禮改河由南旺濟運則於戴村建壩宜如堽城壩之制仍宜於戴村建閘如堽城閘之制冬春水小而清則開閘放水以濟運伏秋水大而濁則閉閘洩水以入海庶民田無淹沒之患運河收利濟之功或謂㑹通河初開之時運糧無多故閘水可以濟運今日運糧數倍於昔建閘放水恐水不足用奈何予曰閘可多建照堽城閘制先建三閘如不足用再建一閘又不足用再建一閘五閘想無不足之理而再於坎河口下多建數閘如堽城壩制水大則洩之入海將閘板盡啟放水北行水小則蓄之濟運不止各閘下板仍將石壩上加一沙壩或一尺髙或二尺髙務使足以濟運而止又戴村壩距東平州六十里一名周李村長五里十三歩汶水從陶泰而來就鹽河由博興車瀆入海永樂九年宋尚書用老人白英計分水南旺築此壩横遏汶水南流㑹通河始得濟運誠全河之屛障也其壩屢修屢圮營費不貲天順五年知州潘洪増築髙厚上植以栁至今不壊先年設夫增土植栁培䕶周宻張純守壩論曰漕河之有戴村譬人身之咽喉也咽喉病則元氣洩走四肢莫得而運矣昔在創建之初歳増土以培之植栁以䕶之多設夫以守之其防禦盖甚宻也後土日増栁日固則夫議停役矣所以寛民力也然物乆則壞防弛則廢即今單薄日甚而原植䕶栁什無一二存矣况兖地土疎汶性湍急萬一水失其性得無慮與然則為之奈何乗泉夫之餘力歳加修築増舖舍植新栁令現役之夫力加守䕶則盤錯根深壩將自固壩固將無所事節乎曰不可也彼其淜湃浩蕩之勢非有以順之則沸非有以蓄之則溢沸與溢等害耳故每遇水潦須決坎河口以殺之殺之不足則開滚水壩又不足則開減水諸閘或順之入海以披其勢或蓄之入湖以納其流㣲則盡塞令餘波悉歸於漕是節之者固所以守之也此營衛吐納之説也不然三汶争趨源大流長夏秋水潦怒激奔逸豈一壩所能支歟誠至論也今歳乆防弛以漸單薄宜如舊例督夫培土栽栁乃運河第一闗鍵不可不加之意也戴村壩議築壩戴村遏絶汶流引水南旺分行濟運明臣宋禮之功也冬春大挑歳勞民力夏秋水長運河澷溢南北被淹者不啻四五十州縣在明臣陳瑄似不能無過也蓋戴村壩乃宋禮因堽城壩而制之者也查元至正二十年朝議以轉運弗便乃自任城開河分汶水西北流至須城之安民山今之開河閘即當年之舊閘也故今日之河底較當年之閘底髙一丈有餘是其明驗也始濟佐奉符畢輔國於堽城之左作斗門一遏汶水入洸後都水少監馬之貞又於其東作雙虹懸門閘虹相連屬分受汶水而於汶河築沙壩一道以遏汶流其後屢築屢傾歳勞民力議者乃欲改作石壩為一勞永逸之計而馬之貞又以石壩能走水而不能走沙沙漲淤平與無堰同河底填髙必溢為害後成化庚寅張克謙既築金口壩並欲築此壩未幾遽以言者召還已而廵撫牟公觀其成績作斗門六春月水小則將斗門盡閉使汶水盡出堽城閘至濟寧以利漕運若遇伏秋水漲則閉堽城閘將六斗門盡閉使水與沙盡由斗門入海故運河無泛濫之虞而濟寧塘河亦未聞如今日南旺大挑之甚也其制度盡善盡美莫有加矣溯明永樂九年宋禮以地勢南下而北髙故水之南行也易而北行也難因用老人白英之計改分水口於南旺而於戴村築壩以遏汶流又自戴村開河九十里至南旺䂓模方定偶以㣲過䝉督責以儒巾治事旋命取材川蜀而明臣平江伯陳瑄即於是年經理河漕續成其功而與侍郎金純都督周長兼督其事功成後人隨於南旺立祠祀陳瑄金純周長此後數十年止知為陳瑄之成並無有知其為宋禮之功者故明臣文淵閣大學士邱濬過南旺詩曰清江浦上臨清閘簫鼓叢祠飽餕餘幾度㑹同河上過更無人説宋尚書謹身殿大學士李東陽詩曰文皇建都向幽薊中𨗳汶泗通漕綱尚書宋公富經畧世上但識陳恭襄𢎞治十七年工部左侍郎李鐩題請表彰宋禮白英之功其後又經工部尚書張昇等具題至正徳六年四月初五日又經工部尚書費宏具題初七日奉㫖是宋禮等既有功運道准立祠致祭是於數十年後始知為白英之計宋禮之功也而不知白英之計未盡行宋禮之功尚未成也若使宋禮白英始終其事則戴村壩自應如堽城壩之制戴村自應建閘如堽城閘之制啟閉有方蓄洩得冝又何至冬春大挑歳勞民力夏秋水漲南北運河漫溢淹沒四十五州縣哉惟陳瑄不能曉宋禮改河之意既未竟厥功而萬恭壘石為灘潘季馴常居敬築石為壩亦未曉馬之貞沙淤壩平之説也至今日而沙淤河髙底與壩平馬之貞之言已驗矣故今日之戴村壩宜照堽城壩之制除舊壩一百丈外再築一百丈較舊壩再髙二尺中作斗門閘八座視水之消長以為啟閉仍於戴村建閘二座如堽城閘之制引水由閘至南旺以節宣運河使不至有甚大甚小之患如是而白英之計始全宋禮之功始成矣然此特就戴村壩而言之也若以㑹通河之全勢論之則更有可議者再查畢輔國始築金口壩引泗水由府河至濟寧濟運又建堽城壩以遏汶水開堽城壩引汶水由洸河至濟寧濟運分流南北汶泗盖並用也斯時糧運僅至安山而止自安山至臨清俱用陸運其後壽張尹韓仲暉及太史邊源相繼建言由安山開河至臨清可免陸運之勞遂以總督漕河馬之貞相厥形勢開通成河而㑹通河始成洪武二十四年河決原武黒羊山以衝張秋而㑹通河淤塞數百里舟不得行自濟寧至臨清又用陸運至永樂九年命尚書宋禮復開㑹通河及用老人白英之計改築壩於戴村又開河九十里引汶水至南旺分流濟運於是汶河有専功而泗水無全力矣但自南旺以至臺庄有泗河沂河及彭口大泛口之河又有馬塲湖獨山湖南陽湖昭陽湖㣲山湖之水且有滕嶧鄒魚之泉水皆可以濟運而自南旺以至臨清并無涓滴之水可以濟運止有安山一湖可以蓄水而今又經佃種矣故南運之水每有餘而北運之水恒不足先時徐有貞因北運淺阻乃於金龍口築壩引黄河之水以濟北運其後張秋屢被衝決屢決屢塞而卒無如北運之淺阻何也余往来河上者三年相厥形勢溯其源流乃知北運之不足皆由於泗河之水未盡其用也再查今濟寧之蓮亭門首即古之分水口也以汶泗二水㑹源於濟寧即於濟寧南北分流以濟運南至天井閘僅十數丈耳北至開河閘則一百餘里盖南運不患乎無水而北運每苦於水少故也後尚書宋禮改汶河於南旺分流濟運竟置泗水於不問殊失畢輔國汶泗並用之意成化六年建南旺上閘曰栁林建南旺下閘曰十里而水之北行始難十八年又建安山閘正徳十二年又建袁家口閘嘉靖十六年又建戴家廟閘而水之北行者愈難水之北行者難是以北運水小又兼以泗河之水俱往南行是以南運水多而北運之水愈覺其小也故今宜於獲麟古渡開一泗河口又於其内開泗河一道兩岸置湖蓄水如汶河法則以泗河之水合諸水以濟南運而以汶河之水専濟北運則北運自無淺阻之患矣然而南旺分水口猶有可議者查笪東光議築上源閘壩以省大挑畧曰宜於每年打壩之處設立石閘一座隨時啟閉又於閘之左右各建減水閘一座名曰斗門一通馬踏湖一通蜀山湖平時則斗門盡閉中閘常開放水入運一遇洪水則斗門盡啟中閘下板五塊沙泥盡隨斗門入湖如此則二湖之役不惟可為水櫃亦可為沙櫃矣縱洪水溷濁未可盡汰亦能去其什之七八雖十年一挑亦可也萬一各處或有淤淺傾頽欲行濬撈則一札板之下可以斷流不用樁草夫力之煩又無曠日稽遲之苦用力少而成功多雖每年一挑亦不為勞矣必如是而後㑹通河庶其成矣乎余故將戴村壩之始末縁由備詳於此又戴村壩在坎河口石壩之南五里土堤是也今直呼坎河口石壩為戴村壩矣後人之誤也修戴村壩查戴村壩建有滚水亂石玲瓏三壩乃遏汶水南流㑹於南旺分濟南北闗係最鉅惟亂石一壩無容修葺其滚水玲瓏二壩並裹頭石塊年乆未修間有傾卸錯亂之處必須修理整齊方可束水濟運應調取泉淺夫役將傾卸處所速為修葺坎河口坎河口壩宜照堽城壩金口壩之制連建數斗門以時啟閉但今沙淤日積河底漸髙將與壩平故宜比舊制稍髙當南接戴村北盡坎河其間設斗門八座如閘之制石壩既長斗門又多則可以洩水而戴村壩無冲決之虞矣又恐壩底太髙水不能洩但照舊制於石壩之上每當春月再築土壩一道或二尺髙或三尺髙蓄水濟運至伏秋水發聽其冲去來歳再築所費無幾甚為妥便又坎河口係汶水洩入鹽河之處遏之不能縱之河竭萬歴十七年題築滚水石壩一座長六十丈水漲任其外洩而湖河無泛濫之患水平仍復内蓄而漕渠無淺澁之虞又坎河口閘在戴村東宋尚書既築壩於戴村遏汶水之入海者注之南旺水無旁洩留坎河口不壩以備分洩入海每歳重運過時止用刮沙板作一沙壩於坎河口即涓滴盡趨南旺若水漲則連沙衝出坎河後河身漸移近坎河口全河之水直灌坎口故土壩歳築歳決萬歴初侍郎萬恭壘石為灘而每歳築壩勞費不貲且全流漫衍而入鹽河南旺每至膠舟萬歴十七年總河潘季馴築石壩四十丈髙三尺上博丈五尺下益尺六之一兩翼之長視壩減五之二其髙倍之左右為土堤二百三十丈東岸為石隄厚一丈其法用丈許大石夾砌如墉實細石其中塗以堊拊上鋭於豐狀如魚背水髙於壩漫而西出漕無溢也水卑於壩順流而南漕無涸也二十一年水大發尚書舒應龍又於河口之下開渠洩水因於兩傍各築石堰以防衝刷利賴甚重防守宜嚴當石壩未築之先主事佘毅中議應築石壩畧曰汶河原從迤南松山之麓衝向戴村入海故宋公築壩戴村遏汶趨南旺而留坎河口不壩以備分洩入海比時松山之麓正河深廣水性就下即順流而南故坎河口止用沙壩近松山一帶沙漸淤平河身移近坎河全河之水俱入故土壩歳築歳決萬歴以來創為石灘似亦良法但重運水渇之時有隙可以洩水而伏秋水溢之日則無路可以通沙以故正河淤塞日甚每歳築壩之勞費如故為今之計急宜大集泉壩人夫從正河見流之身挑去淤沙使漸近松山一帶照舊深廣水入正河既順則入坎河漸㣲但坎河口深廣倍昔沙土堤壩必不足恃欲為經乆之策莫若連建數閘以時蓄洩如元人堽城壩之制蓋國朝運道之有戴村猶元人運道之有堽城堽城可閘則坎河亦可閘也其次莫若採大石為壩如馮家滚水壩之制查迤東龍山一帶可取大石去坎河僅五里許合無量動河道官銀募工製器如式開鑿運砌西接戴村東盡坎河俱挑沙入地數尺先砌石基後酌量水平建滚水長壩其兩土岸俱用大石砌為雁翅以防水之旁衝主事張文竒又議應仍築土壩略曰宋公築壩戴村而留坎河不壩者勢不可也諸泉合流三汶爭趨其勢曷常一日不欲東注之海哉况霖潦之時乎故方其水涸春夏三四月秋冬九十月運道咽喉所係即涓滴盡歸南旺湖可洩也若夏秋之間則南旺濟寧一帶通漕啟板水尚漲溢與運河岸平坎河口雖開而迤下王堂王巖何家缺口十餘處且不免一二衝決汶邑民田多罹淹沒宋公之慮深逺矣邇來議者因土壩歳築勞費創為石灘但方其水溢勢甚洶湧若石灘阻壅不能大洩勢必多潰裂於王堂諸口及草橋上下驟水所經民田受害非細不便一且灘能走水不能走沙淤沙日積河身日髙漸與灘平反助障阻不便二况未及兩年石灘衝動水涸之時乗隙而洩土壩仍不能免又奚賴焉議者又欲築建滚水大壩以淤沙不能衝出弊與石灘等為今之計坎河既決一俟霜降後即當仍舊歳築土壩計每歳之費大約不踰百金且水直衝坎河則上源之勢既殺而下源之勢稍㣲王堂諸口不致盡決汶邑民田得免淹沒以利害計雖歳有數十金之費利倍於害矣加之歳挑西岸沙嘴使正河深廣漸復故吾水不東逼徑流趨南則戴村壩根既被衝刷之患坎河壩兩際亦不至盡決無存議者慎無重惜小費輕議難成壅遏漲水而貽意外之虞也二公之議不無異同然其慮未始不周迨張公居敬循行汶上規畫建言而潘公季馴之石壩始成宋公之渠於以永賴乃知創建非常昔人不敢輕視一坎河也宋公留其口而不壩萬公以石為灘潘公以石為壩因時異建罔弗合宜蓋慎之也後之人披覽往迹其可妄行舉廢哉坎河口石壩坎河口石壩止百餘丈不足以備分洩每逢水長戴村土壩常被衝決故宜將石壩再加寛一百丈庶乎水易分洩而戴村壩可保汶上亦免淹沒之患居濟一得卷三
