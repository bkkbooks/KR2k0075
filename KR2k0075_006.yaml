body:
  text: 居濟一得卷六禮部尚書張伯行撰治河議善治水者為其水大而能治之使小水小而能治之使大也水大而能治之使小所以除水之害也水小而能治之使大所以資水之利也故古之治河也易今之治河也難古之治河止以除水之害今之治河兼以資水之利惟其止以除水之害故禹之治水使水以四海為壑而已無餘事惟其兼以資水之利故不得聽其以海為壑必使之曲折回旋致其水為有用之水而其餘乃歸於海也此善治水也若竟聽其以海為壑則不得資水之利矣若使之曲折回旋致其水為有用之水而其餘不使之歸海焉則資水之利而究不免於受水之害烏覩所謂善治水者乎我國家嵗漕東南數百萬以實京師所藉者會通河一線之水耳故方其旱也則運道乾涸而漕病及其潦也則潰溢衝決民病而漕亦病所貴乎善治水者使水不至於甚大而堤岸無漫溢之虞民田免淹沒之患使水不至於甚小而運河不致於淺澀糧艘不致於艱阻斯已矣何今之不然也豫於癸未年始膺簡命受治河之職適遇雨潦堤岸在在漫溢民田處處淹沒而豫兩次監收截留漕米並無暇計及於河是水大而不能使之小也豫之職有所未盡也逮至甲申又遇亢暘河水處處淺澀糧艘在在艱阻而豫極力設法多方處置糧運幸得無誤是水小而不能使之大也豫之職又有所未盡也豫夙夜兢兢日求所以無負是職者而不能乃博極羣書考古人治河之方又遍歷河干觀古人已然之迹乃知尚書宋禮分水南旺其法雖善而猶有所未盡考元李惟明改作東大閘記略曰昔汶不通洸國初歲丁巳奉符畢輔國請於嚴東平始於汶上之隂堽城之左作一斗門遏汶水入洸至任城汶由是有南入泗淮之派後都水少監馬之貞又於其東作雙虹懸門閘虹相連屬分受汶水既又以虹石易圯乃改其西虹為今閘制通謂之東閘謂輔國所作斗門為西閘西閘後改作址髙水不能入獨東閘受水汶水盈縮不常歲常以秋分役丁夫採薪積沙於二閘左絶汶作堰約汶水三之二入洸至春全堨餘波以入霖潦時至慮其衝突則堅閉二閘不聽其入水至徑壞堰而西循故道入海故汶之堰嵗修延祐五年改作石堰五月堰成六月為水所壞水退亂石齟齬壅沙河底增髙自是水歲溢為害至元四年秋七月大水潰東閘突入洸河兩河罹其害而洸亦為沙所塞非復舊河矣初之貞為沙堰也有言作石堰可歲省勞民之貞曰漢曹參作興原山石堋常為漲水所壞時復修之汶魯之大川底沙深濶若修石堰須髙水平五尺方可行水沙漲淤平與無堰同河底填髙必溢為害况河上廣石材不勝用縱竭力作成漲濤懸注傾敗可待晉杜預作沙堰於宛陽堨白水溉田闕則補之雖屢勞民終無水害固知川之不可塞也且曰後人勿聽浮議妄興石堰終困其民壅遏漲水大為民害重修堽城壩因自作記勒其言於石至是果如其言若合符契閘壞岸崩碑沉於水為土石所壓是年九月都水監馬兀公來治會通河行視至堽城謂衆曰堽城洸汶之交會通之喉襟閘壞河塞上源要害役有先於此者乎於是用前監丞沈溫公闢為一大閘之議命壕寨官梁仲祥李讓計徒庸度材用量事期以狀上中書即從其請明年二月命工入山取石煆灰市物於有司經營揆度畫圖指示以舊址敝於屢作改卜地於其東掘地及泉降汶河底四尺順水性也始事於五月七日畢役於九月十日閘既成衆合辭請公願識其事於石屬筆於豫豫復之曰汶古名川昔畢公馬公用之則為轉漕之益為溉灌之利後人用之則有橫潰之憂有墊溺之患水性非異今昔蓋用之善不善也馬公既善用之又碑其言以示來者其慮後也深矣不有茲役曷彰馬公之實其言以驗碑仆於水而改作石堰之碑尚存豈天惡馬公之言有以先發其機耶將使後人獨受其害而不蒙利耶惟是役也雨暘時若漕運無愆天其或者悔禍於人俾憶馬公之言乎既不獲辭遂為敘𨗳汶始末會通源委以見堽城閘水利喉襟且表出馬公之言以為鑒觀於此記知堽城之宜閘則知戴村之宜閘矣知沙壩之為善則知石壩之為不善矣又李惟明濬洸河記略曰至元六年監丞宋公委壕寨官嶽聚統奉符汶上二縣夫六千餘濬洸河底濶五步上倍之深五尺未閲月工畢而深固堅完洸河既濬宜令閘司嚴飭閘板謹杜閘口絶塞沙源勿令流沙上漫入洸俾洸常受清水以輸注南北役閘似繁濬洸實簡此源潔流清而永益也不然以嵗益無窮之汶沙注新濬有限之洸河數年之中余恐淤墊有甚於今日矣梗漕勩民後將有不勝其淘濬之患觀於此記則知閘之可以納清流而避淤沙司閘者宜嚴而不可以或忽也明商輅堽城壩記略曰成化戊寅工部尚書郎張君克謙奉命治河歷觀舊迹首修金口堰以石易土不數月告成乃曰斯堰既修堽城堰亦不可已又以堽城舊址河濶沙深艱於用力乃向西南八里許其地兩岸屹立根連河中堅石縈絡比舊址隘三之一於此置堰事半功倍隨擇癸巳九月望日興事儲材聚料百需咸備明年春三月命工淘沙鑿底石掌平底之上甃石七級每級上縮八寸髙十有一尺中置巨細石煮秫米為糜加灰以固之底廣二十五尺而用石板甃二層廣一十七尺袤一千二百尺開甃口七各廣十尺髙十一尺置水板啓閉遇水漲啓板聽從故道西流水退閉板障水南流以灌運河茲堰東置閘為二洞皆廣九尺髙十一尺中為分水一旁為雁翅二亦用板啓閉以候水消漲漲則閉板以障黃潦消則啓板以注清流洞上覆以石石之兩旁仍甃石髙一十有八尺中實以土與地平俾水不致南侵洸河免於沙淤觀於此記建石堰則開甃口七置板啓閉水退閉板障水南流以灌運河水漲啓板聽從故道西流是水去而沙亦與之俱去自無河底墊髙水溢為害之患矣修石閘亦用板啓閉水漲則閉板以障黃潦消則啓板以注清流自無沙淤運河歲歲挑挖之患矣此古人制度之盡善可法而可傳者也何上書宋禮之改河猶未深察乎此也改河南旺分水南北以濟漕運此宋禮之功也不修石閘相時啓閉任水南流以致運河沙淤歲歲挑挖遂貽山東無窮之害宋禮亦有不得辭其咎者矣然在改河之初不過數丈水之入鹽河也順而赴南旺也逆且築壩戴村而留壩以備分泄止坎河口歲築沙堰一遇水漲盡皆衝去故水之趨海也多而至南旺也少山東運河兩岸之州縣猶未為大害也逮其後河日刷寬其赴南旺也易而入鹽河也難萬恭又壘石為灘潘季馴復築石為壩豈二公者獨未聞馬之貞之言乎抑未覩張克讓堽城壩堽城閘之制乎何至今日而沙填河底水溢為害遂使馬公之言若左劵也夫汶河之水原由坎河口入鹽河以達於海是以海為壑者也自石壩既築而於石壩之北又髙築土壩遂使水不得歸海而盡趨南旺夫以運河一線之渠豈能容汶河泛漲之水漫決橫潰洋溢民田勢所必至是水不以海為壑而直以山東運河兩岸之州縣為壑也且不獨以山東運河兩岸之州縣為壑而並以直𨽻江南運河兩岸之州縣為壑也張純守戴村壩論略曰每遇水潦須決坎河口以殺之殺之不足則開滚水壩又不足則開減水諸閘或披之入海以分其勢或蓄之入湖以納其流微則盡塞令餘波悉歸於漕是決坎河口之宜急在昔日而已然初不以既有滚水壩而遂不開坎河口也乃今則不決坎河口矣且於坎河口髙築土壩矣以故每逢水潦先淹汶上積水既髙一遇衝決驟水所經並淹東平且南而濟寧魚臺巨野嘉祥以及江南之徐州沛縣等處北而東昌臨清以及直𨽻之清河故城等處皆所不免又何怪乎民生之受害無窮也夫昔日之守壩也守戴村壩則決坎河口此古人之神明變化妙運於一心者也今之守壩也守戴村壩而並守坎河口壩此後人之執泥悖謬膠固而不通者也或曰坎河口石壩亦足泄水矣安在水之不歸於海也不知坎河口石壩僅百十丈耳以數百丈之汶河而僅恃此百十丈之石壩以泄之且髙出三尺而後泄之其所泄亦有限耳安能殺汶河之勢哉由此觀之是汶上巨野嘉祥濟寧滋陽寧陽魚臺滕縣嶧縣以及江南之沛縣徐州邳州連年屢被水災者一由於汶河堤岸不修之故一由於戴村壩入運之汶河太寬也查寧陽汶河南岸有石梁口最稱險要一遇沖決先淹寧陽次及汶上濟寧滋陽又次及鄒縣魚臺滕縣嶧縣而後至江南之沛縣徐州邳州是此十數州縣之所以被水者歷來皆由於石梁口也至康熙四十一年二年為害更烈而汶河南岸之沖決者又不止石梁一口也又有桑家等口俱被沖決所以淹沒之慘較往昔而倍甚去嵗已飭行堵築今年雨水稀少河水又無大漲幸未沖決然而不可恃也昨親往查看見堤甚單薄且係頂沖而離堤數十丈內有髙阜之處可以加築越堤又見石梁口上下堤岸殘缺者甚多若於石梁口加築越堤再於桑家等口堵築堅固又於沿河一帶堤岸加幫髙厚不惟寧陽不受水災而汶上滋陽濟寧魚臺滕縣嶧縣及江南之沛縣徐州邳州俱受寧陽之福矣夫堵築石梁等口加幫汶河堤岸非有浩大工程難以奏績也用力甚少而成功甚多為費無幾而造福無窮從事者皆以因循誤事逮至沖決即欲補救而已無及矣及今若不早為堵築堅固將來山水發時勢必難免今宜將石梁口加築越堤桑家等口修築完固沿河一帶堤岸加幫髙厚並嚴飭汶上縣令其將汶河堤岸亦為加幫髙厚庶捍禦有資水不為害而寧陽汶上濟寧滋陽等十數州縣之民得免淹沒之患矣何言乎戴村壩入運之汶河太寬也查南旺分水口往南例係三丈往北係七丈是合南北運河而總計之不過十丈寬耳而戴村壩之汶河乃有數百丈寬以數百丈之汶河而盡注於十丈寬運河之內欲其不沖決堤岸泛濫民田也得乎所以一經泛濫而汶上先被其害次及巨野嘉祥濟寧魚臺滕縣嶧縣漸至江南之沛縣徐州邳州均受其害矣查宋尚書既分水南旺築壩戴村留坎河口不壩者所以備分泄也故遇伏秋水大則決坎河口以殺之殺之不足則開滚水諸壩又不足則開減水諸閘蓋以運河之水止取足以濟運而止餘水盡令由鹽河下海所以運河可保堤岸無沖決之虞民田免淹沒之患此載在全河備考昭然可查今則伏秋水漲不決坎河口分殺水勢且於坎河口髙築堤岸僅恃百丈之石壩以泄之泄水能幾何乎坎河口不能泄水勢必盡趨於南旺泛溢於運河沖決堤岸淹沒民田先淹汶上次及巨野嘉祥濟寧魚臺等十數處又何怪乎諸州邑之水患不息也不此之圖而乃欲開忙生閘及馮家大壩夫欲開忙生閘及馮家滚水大壩者將欲使汶上竟不受淹乎抑欲使巨野嘉祥濟寧魚臺等十數州縣同汶上一併受淹乎若使汶上竟不受淹則開忙生閘馮家滚水大壩誠屬有益矣而必不能也若使巨野嘉祥濟寧魚臺十數州縣同汶上一併受淹何不仁之甚也况以鄰國為壑古人所戒乎且馮家滚水大壩所以障蜀山湖之水而非以泄蜀山湖之水也特水大有餘則泄之耳故無論馮家滚水壩不當開即利運閘亦不當開也無論忙生閘不當開即十字河亦不當開也何也水宜泄於北而不宜泄於南也南固未嘗乏水也竊聞從前一遇伏秋無論水之大小輒開利運閘十字河將水盡往南放所以北河一帶每遇天旱糧船即為淺阻而濟寧魚臺等處無論旱潦田沉水底數十年不能耕種余到任後聞之駭然乃博覽羣書且往來相度形勢始恍然悟曰此皆由開利運閘十字河之故耳乃嚴飭河官不許開利運閘十字河而又差人專守利運閘使水不得南行又差人守栁林閘板又盡啓十里閘板放水北行且開八閘月河以放微山湖及昭陽湖南陽湖之水所以北河無淺阻之虞而濟寧東南魚臺等處之田盡皆涸出而不知者猶曰今年天旱故田地得以涸出獨不思濟寧東南及魚臺等處田沉水底已經十數餘年矣豈從前十數餘年來盡屬雨潦之年乎何其不亮之甚也夫欲開忙生閘及馮家滚水壩者不過欲泄汶上之水以淹巨野嘉祥濟寧魚臺等十數州縣耳夫欲救汶上者當使汶上之不淹而不當使汶上先受其災而並使巨野嘉祥濟寧魚臺等十數州縣均受其害也夫與其先淹汶上而巨野嘉祥濟寧魚臺等十數州縣均受其害何如不淹汶上而巨野嘉祥濟寧魚臺等十數州縣均不受害之為得乎然果何以能不淹汶上乎查汶河之水當未有南旺漕河時原由坎河口入鹽河下海者也自宋尚書用白英之言築戴村壩以遏汶水又往南開支河一道引汶水以達南旺分流濟運夫宋尚書開河之始不過數丈寬耳以數丈寬之河引水以達南旺汶上又何由得淹乎汶上不淹而巨野嘉祥濟寧魚臺十數州縣又何由而得淹乎自數百年以來此河日刷日寬逮至今日不啻數百丈矣以汶水全河之勢而盡趨南旺此運河之所以受害而民田之所以被淹也善哉潘印川之言曰治河者無一勞永逸之法止有補偏救弊之法則於今日而施補救之術惟有倣堽城閘壩之制建石閘石壩乃為萬全但工程浩大一時難成其次莫若先於戴村汶河兩岸築土壩用掃裹頭中留二十丈口門引汶河達南旺濟運餘水俱由鹽河下海俟石閘修完將此二十丈亦行堵閉如是則蜀山南旺二湖不得盈溢忙生閘馮家壩俱不必開不惟汶上不被水災而巨野嘉祥濟寧魚臺等十數州縣均不受害矣或曰留二十丈口門達南旺濟運餘水俱由鹽河下海東平州獨不慮淹沒乎豫曰東平州原有鹽河兩岸堤工故民不受水患奈年深日久傾圮剝削殆盡而鹽河之底沙淤日髙所以邇年以來屢被水災職是故也今惟將兩岸堤工加幫髙厚則水有所束自不至泛溢民田矣或曰加築堤岸東平州可以不淹矣獨是使水俱由鹽河下海僅留二十丈口門達南旺濟運則東昌一帶運河不虞水小乎豫曰不然有張秋棗林河沙河在昔宋尚書既分水南旺又慮北河水小乃於張秋西南開汊河一道上達汴梁於金龍口建壩分黃河之水達於張秋以濟北運宣德五年十月平江伯陳瑄言自臨清至安山漕河夏水淺舟澀張秋西南原有汊河通汴舊常遣官修治遇水小時於金龍口堰水入河下注臨清以便漕運比年缺官遂失水次漕運實難乞仍其舊從之至十年九月廷臣會議漕運事宜言沙灣張秋運河舊引黃河支流今歲久沙聚河水壅塞而運河幾絶宜加疏鑿從之正統元年漕臣會議復言金龍口水接張秋是引水通運之處宜令工部委官一員巡視提督遇有淤塞會同河南三司鳩工疏濬之上命允行其遴選公亷幹濟之人以往毋使因而擾民違者罪不宥凡此者是止知為漕運之利而未嘗計及其害也豈知利方得而害已隨之乎自是之後黃河屢決而張秋之害乃不可勝言矣至十三年七月河決滎陽從開封北經漕濮張秋潰沙灣之東堤決大洪口諸水從之以達於海事聞上命工部右侍郎王永和往理其事四年正月河復決沙灣新缺口之南二月趙榮言黃河之趨運河勢甚峻急而沙灣抵張秋舊岸低薄故此方築完彼復決溢不為長計恐其患終不息也臣等議請於新決之處用石置減水壩以殺其勢使東入鹽河則運河之水可蓄然後髙厚其堤岸填實其缺口庶無後患從之仍命原厰給鐵牛十八鐵牌十二與之五年十一月有貞言沙灣治河三策一置造水門臣聞水之性可使之通流不可使堙塞者禹鑿龍門闢伊闕無非為疏𨗳計故漢武之堙瓠子終勿成功漢明之疏汴渠逾年著績此其明驗也世之言治水者雖多然於沙灣獨樂浪王景所述制水門之法可取蓋沙灣地土皆沙易致塌決故作壩作閘皆非善計臣請依景法為之而加損益於其間置門於水而實其底令水常五尺為凖水小則可拘之以濟運水大則疏之使趨於海如是則有通流之利無堙塞之患矣一開分水河凡水勢大者宜分小者宜合分以去其害合以取其利今黃河之勢大故恆衝決運河之勢小故恆乾淺必分黃河合運河則可去其害而取其利請相黃河地形水勢於可分之處開成廣濟河一道下穿濮陽博陵二泊及舊沙河二十餘里上連東西影塘及小嶺等地又數十餘里其內則有古大金堤可依以為固其外則有八百里梁山泊可恃以為泄至於新置二閘亦堅牢可以宣節之使黃水大不至泛溢為害小亦不至乾淺以阻漕運一挑深運河臣惟水行地中避髙趨卑勢不能遏故河道深則能蓄水淺則勿能今運河永樂間尚書宋禮即會通河浚之其深三丈但以流沙恆多淤塞後平江伯陳瑄為設淺鋪又將軍丁兼挑故常疏通久乃廢弛而河沙益淤不已漸至淺狹今之河底乃與昔之岸平其視鹽河上下固相懸絶上比黃河來處亦差丈餘下比衛河接處亦差數丈所以取水則難走水則易誠宜浚之如舊𢎞治二年河決封邱金龍口漫祥符下漕濮衝張秋運河命戶部侍郎白昂塞之五年七月河復決金龍口潰黃陵岡東北入漕河遣工部左侍郎陳政兼僉都御史往治之未幾政卒升浙江右布政劉大夏為右副都御史往治決河七年二月河復決張秋從沙灣之下十里潰東堤入海運河水涸盡入決口漕舟不通四月復遣太監李興平江伯陳鋭協同大夏督治張秋決河十月山東按察使司副使楊茂元奏張秋之役官多而責任不專供億甚巨乞取太監李興總兵陳鋭回京專任都御史劉大夏以責其成功八年二月塞張秋決河功成本朝順治七年九月黃河決荆隆口荆隆口即金龍口趨張秋城南馬星海甜瓜口沙灣戴家廟迤西堤岸並決水由大清河入海張秋工部分司閻廷謨率捕河通判方聖時督官夫修治至次年辛卯漸有成緒九年壬辰七月黃水又大溢力不能施工役暫停廷謨亦得代去著決口行漕圖説以貽後官十年癸巳黃水為災其杜塞之迹無文籍可考十一年河又決十一十二兩年杜塞之迹無文籍可考十三年荆隆決口塞成張秋決口並塞是數十年來止以塞金龍口為事專避黃河之害而開封至張秋一帶之河遂廢而不修日漸淤塞運河隨失其利而曹州鄆城巨野嘉祥濮州范縣之水不能入運遂泛濫而不可治泛濫於南則自曹州鄆城定陶曹縣巨野嘉祥以至濟寧魚臺滕縣嶧縣及江南之沛縣徐州邳州均受其害泛濫於北則自濮州范縣朝城莘縣陽穀夀張以及聊城東阿博平清平堂邑臨清夏津恩縣及直𨽻之清豐南樂清河故城俱被其災是山東之水災不除而並及於直𨽻江南者皆由於張秋之沙河棗林河不行開濬故也旨哉黃承元之言曰其譬之身乎曹濮諸州邑其腹也張秋其尾閭也尾閭下壅而欲腹無中滿得乎先是司河者執拘攣重為運道慮而不敢量為疏通諸州邑之患遂計畫無復之矣愚謂前此之決河為患耳自黃陵岡一築則河害永絶而運河之東又設有減水諸閘壩可恃節宣即使鄆濮諸水溢而東出由鹽河入海豈遂有妨於運乎奈之何懲噎而廢食也余初承乏安平值大潦後鎮西諸水不得外瀉率鍾為汙澤余為盡啓沙灣諸堰聽其常流諸邑沮洳得見土可藝即漕河亦稍資其灌輸此已事之一驗矣黃承元之言如此總之前此諸公日以開金龍口為議者欲堰黃水入漕濟運是計及運河之利而未嘗計及於黃河之水之為害也後此諸公日以堵築金龍口為事者又止知避黃水之害而未嘗計及運河之利也况順治十四年正月內總河楊芳興奏銷北河分司所轄夀張縣沙灣西岸湖口南北二假長二十二丈五尺又湖邉起至八里廟河邉止挑過引河一道計長五百丈口濶三丈底濶二丈深一丈共奏銷過銀二千三百九十六兩五錢二分是在本朝未嘗不疏濬也或曰金龍口既經堵築矣黃河之水已絶即使開沙河棗林河安所得水濟運乎豫曰不然曹濮之間未嘗無水也查張秋西南諸邑水利其源自黑羊山澶淵等坡而入濮者為魏河其源自澶滑青龍等坡而入濮之董家橋者為洪河其源自曹州而入濮者為小流河三河合流於濮之東南出楊二莊橋入范縣竹口又東徑張秋城南過道人橋入運又有源自曹濮范縣回龍廟而來者為清河亦名水保河有源自定陶徑曹州新集而來者為天鵝坡之水有源自鄆城出五岔口而來者為廪邱坡之水俱入西裏河徑黑虎廟楊家橋至沙灣小閘入運河方張秋之未決也津流徑通直抵運道及張秋屢決髙築堤堰厄其下流而故渠亦往往湮廢故曹州鄆城濮州范縣遂苦水患而鄰邑之受害者亦無窮焉今惟將此二河開通不惟諸州邑之水患永除民生可蘇而國家漕運亦賴以永濟焉或曰開此二河固可除諸邑之水患可濟漕運之淺澀但一遇雨潦之年運河水大而再以諸州邑之水滙聚於沙灣堤岸可保無虞乎豫曰有五空橋減水壩在但今壩底太髙不能泄水宜去面石二層或三層使遇水大則由此泄入鹽河下海堤岸自可保固不致疏失再將大感應廟東建減水壩十丈寬以泄運河有餘之水則堤岸可保而民田亦免淹沒之患矣再將沙河之上源分一支由陽穀之官窰口入運再分一支由聊城之龍灣入運且將聊城之減水閘四座俱行開通以泄運河有餘之水使入徒駭河由漯河下海查徒駭河無所考據聊城縣申稱即七里河之别名也再查七里河即古之漯河也孟子曰禹疏九河瀹濟漯而注之海即此是也由聊城而北博平縣境又有減水閘五座亦所以泄運河有餘之水也將此閘亦行疏通則水之入海者順而運河兩岸自無泛溢之虞矣是山東全河之利也最可異者聊城之徒駭河濮州范縣之魏河洪河小流河皆有利於運道有益於百姓急宜開濬者也而乃以為有礙運道無容開濬夫張秋東昌一帶之運河每苦於水小則開魏河洪河小流河由沙河入運以濟漕河之淺利運道乎礙運道乎若一遇河水泛漲則開聊城之減水閘由徒駭河泄之入海而堤岸可保民田不淹利運道乎礙運道乎至開忙生閘牛頭河有礙運道者也而乃以為當開夫忙生閘永通閘為牛頭河之上源而運河底髙牛頭河窪下忙生閘永通閘一開運河之水必至乾涸此固人人所共知共見者也即曰蓄泄有時啓閉由人獨不思此二閘廢壞已闕東平州鹽河支河鹽河至東平州而支河甚多州之東南西俱有至州之北梁灝橋合而為一今俱宜挑挖深通以備分泄則州城可保而田禾亦免淹沒矣築鹽河堤岸東平州屢被水災數年以來民不聊生皆由於鹽河不修之故查鹽河舊有堤岸祗因年深日久傾圮剝削殆盡故每遇水長民田即致淹沒今惟將兩岸堤工加幫髙厚則水有所束直趨下海不致漫散而民田自無淹沒之患矣又汶河之水由東平州鹽河下海故每逢水大則兩岸皆宜加築堤岸以禦之則自無淹沒之患應浚河道據各府廳查覆境內應浚河道應令地主挑挖或令有地之家助食而佃户出力至於無主之地則令地方官捐夫挑浚必俟秋收之後始可舉役等情今查東省年歲頗收又值秋成之後正宜興修之期其牛頭河一案現奉俞旨疏浚在濟寧州境者河道寬深無庸疏浚外惟魚臺境內尚有稍淤之處略加疏浚之功則河通流無滯其曹州之賈魯河朝城縣境內之舊渠河陽穀縣之西湖境聊城縣之七里河博平縣之湄河並減水閘清平縣之引河亦當亟宜挑浚者也又鄒縣泗河堤岸滋陽濟寧泗河府河堤岸寧陽汶上二邑汶河堤岸東平州之鹽河堤岸所當亟宜修築者也以上應浚河道應築堤岸應飭各州縣上緊浚築務於十一月內完工庶水患永除而民困得蘇矣聊城縣七里河聊城縣境內有七里河一道凡遇漕河水漲以備泄水之用相應挑浚深寬分泄水勢流至博平歸海陽穀縣西湖境此湖在城西離城八里地處窪下南接濮州范縣朝城夀張四州縣之水俱入陽邑由孔家橋灌入西湖境內尚有戴家故莊水渠一道因年逺淤塞久成民間熟地以致積水難於下流淹沒民田此應行挑浚開掘深通使其水分泄於朱家河劉家口烏龍潭等處入莘縣境盛家河黃家河仍入陽邑蓮花橫鵝鴨坡統入聊城縣境龍窪歸入運河俾水既可濟運而民又免淹潦之患誠千載不朽之盛事也清平縣引河魏家灣迤南大壩下舊有引河一道水勢情形應行挑浚有利民生運道博平縣減水閘博平縣有減水閘五座自南而北其北界河岸名逃戶口者為第五閘遇河水稍長則由此閘泄出以殺其勢再長則四三二閘漸次開泄由古漯河入海以保河岸以護民田後因年久閘廢出水之河亦淤塞不通每遇河水漲發必至漫溢堤岸淹沒民田所當急為修浚曹州賈魯河此河自桃園集入州境迤東九十八里折北而至閻什口出州境共長一百八十里州東南二方之水俱入此河自元季為分泄黃河之别渠及塞黃陵岡決口河歸故道而賈魯隨成廢河前經紳襟耆庶會議止將久淤河心挑掘一溝自通堌集至黃家口共計三十二里便可承受夏秋雨漲之水順流而下不致淹沒田禾按河兩旁地土有主者令其照河身自挑無主者官捐募夫亦易為力其餘新挑河夭家河等處俱照此插工但通堌等處與東明縣壤地相連工小費省令彼處業戶協力疏通而賈魯河夭家河新挑河等處皆入濮州境內應一體開浚歸入張秋運河其清浪集與巨野縣之龍堌集田家橋相接亦應齊力開𨗳彼此無妨再按賈魯河形勢曲折時盈時涸決其淤塞一往無阻即水達運河並無有礙居濟一得卷六
