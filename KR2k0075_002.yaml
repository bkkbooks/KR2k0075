body:
  text: 居濟一得卷二禮部尚書張伯行撰沂河濟運查沂河之水原合泗水由黑風口入府河濟運者也數十年來舊制不修河失故道沂河之水不合泗水入黑風口竟由金口壩下直趨魯橋矣今應照舊修理使沂河之水合泗河之水仍入黑風口由府河濟運使水無旁泄而於運道大有裨益又查沂河舊制合泗河由金口閘入濟運者僅一二分金口閘即今黑風口是也而出魯橋入運者乃八九分今舊制盡湮河道淤墊沂河之水並不能由金口閘濟運而盡出魯橋矣故今宜於金口壩之東南建壩一道如金口壩之制又將沂河合泗河之舊制挑挖深通使沂河之水合泗河之水由金口閘入府河由馬場湖出馮家壩由十字河濟運再泗河沂河之水可以專濟南運汶河之水可以專濟北運引沂泗二水入運明臣劉珝金口堰記略云堰距兖州東五里許以其障沂泗之水入金口閘西達濟寧㑹通河因號今名考之後魏及隋元以來皆嘗修築以通漕運都之建不一堰之興廢亦不一暨我太祖髙皇帝定鼎金陵無事乎堰太宗文皇帝駐蹕北京復通漕運而堰多事矣前此堰築以土每夏秋之交波濤洶湧即圮無餘萬夫之役不資之費為之蕩然自永樂以迄於成化朝廷雖數命官修固卒莫能底定歲庚寅都水主事宜興張公克謙祗承是任乃曰與其屢廢以病民孰若一勞而永逸乃易土以石自地平石計五層髙七尺湫口三處視水之消長時其啓閉橫巨石為橋以便往來愚按金口堰即金口壩也原障沂泗二水入金口閘西達濟寧㑹通河自府河淤塞而二水不能濟運矣今宜大挑府河引水至長溝入運而汶河口移北十里則南旺大挑既易而東昌一帶不至於淺阻夏鎮一帶不至於湖河相連矣此運河萬世之利也是在後之君子留心運河者力舉而行之耳沂水紀略云沂水發為二流其一由金口壩以㑹泗者僅什一其一由捲里以濟師家莊閘者則什之八九均之利也而天井急何者天井髙而師家莊平也萬一泗水渴濟河淺天井澀則遏沂益泗當不可已復永通閘永通閘所以泄運河之水入牛頭河者也每逢水漲運河難容則由此閘宣泄故天井閘水不甚大糧船得以遄行自永通閘堵閉運河之水無處宣泄天井閘水勢湍激糧船難行一船用數百名夫一日僅過數船此糧運所以遲滯也今議復建此閘水大則泄之水小則蓄之斯善矣馬場湖馬場湖原受蜀山湖之水者也由馮家滚水壩入湖故於五里營建束水堤一道以蓄水又建減水閘一座以泄水又於十里鋪安居各建減水閘一座以備蓄泄此古制也自馮家滚水壩堵築開五里營堤口而馬場湖乃不受蜀山之水而受府河之水矣府河即泗河也既引泗河之水入馬場湖自應於馬場湖內開河一道於長溝開一泗河口放水濟運如南旺汶河口之制則泗水始為有用矣以泗水濟南運以汶水濟北運而北運之水自無不足之患矣又濟寧州志云本衛河道北岸有馬場湖一處周圍六十里蓄水濟運軍民不得占種立有禁碑又馬場湖原受蜀山湖有餘之水由馮家滚水壩以入湖故於五里營東築壩以障之而於五里營西建閘又建十里閘安居閘皆所以放水濟運者也但昔日受水之處在北故放水之處在南今則受府河泗河之水矣受水之處在南故放水之處又宜在北須於大長溝東或大長溝西建閘放水以濟漕運實為允當蓋有此一閘而十里閘安居閘楊家壩俱可不開矣馬場湖小閘濟寧城西馬場一湖乃係蓄水濟運之區舊由安居十里鋪二處斗門放水入運但安居十里鋪二處斗門在於東南地勢甚窪一開斗門水勢直瀉且於通濟閘上不能接濟今議於小長溝迤南河東岸建一出水小閘將馬場湖之水由此入運上抵栁林閘啓板之水不至下流直瀉用濟小長溝並通濟閘上下一帶之河此閘一修啓閉以時蓄泄得宜誠屬有益於漕運馬場湖地河防一覽內載馬場湖中原有髙亢從不上水之田九十三頃當魚滕被淹之時曽將此地令人佃種賠補魚滕二縣之糧後二縣田地涸出即將此地仍歸馬場湖不許耕種若果有民田被淹即以此地頂補似無不可豈濟寧之田可以賠補魚滕之糧反不可以賠補濟寧之地乎况地界相連耕種為便又非有隔縣百餘里之遙也復馬場湖馬場湖舊制七百餘頃自知州吳柳栽葦園招佃種而馬場湖盡為民田矣加以府河淤塞久不挑濬而泗河之水盡由金口壩南下由魯橋入運金口閘內淤塞府河不通泗河之水不復至馬場湖而馬場湖廢矣故今日欲復馬場湖須查吳知州栽葦園者若干頃招人佃種者若干頃使俱歸於湖而又大挑府河引水入湖以濟運則馬場湖之舊制可復矣又宜將馮家滚水壩改建閘座使水由大長溝迤西對十字河入運庶為盡善清查湖界漕河一線轉運數百萬國糈是以開河以來設立各閘蓄以濟之奉有俞㫖不許奸民盜種法至善也查馬場一湖在濟寧城西相距城廓止二三里許承受府洸二河之水蓄以濟運名曰水匱舊制原額七百三十頃因年久時湮湖界無存奸民兾其肥腴日深一日悉成民田以致湖不足額受水無幾弗能濟漕一遇雨水連綿山水暴發泛濫四出不惟淹沒民田抑且有妨於漕堤應委官踏丈俾足原額七百三十頃南有漕河無庸築堤外北邊建築湖堤一道不惟衛湖水不能四出淹沒民田抑且使小民不得侵種庶界限清而於漕運民生大有裨益矣勸民耕種涸田濟寧南鄉一帶地勢窪下邇來叠罹水患有地不盡耕種懸磬興嗟哀鴻堪憫皆因楊家壩開通放水不入馬場濟運而徑由運河轉至南陽湖南陽一湖不能容納遂漫入南鄉一帶是以民田受淹余將楊家壩堵閉不使過水則南鄉民田俱可涸出又查得宋家窪之水與忙生閘盜決之水亦為南土之害余將宋家窪之水開河引𨗳向北流入運河直達臨清忙生閘嚴飭禁閉更將南旺湖之水疏浚北流則南鄉一帶從前受害之田自此可無慮矣風花臺風花臺在城西十里屹然一邱突起湖濱臺四周皆荷花清芬撲人風夕倍勝故名逺望之如翠嶴浮海面安居閘安居閘亦不可輕開為其泄水太甚也必俟白嘴不能入運方可開放此閘然開放亦當有節須閘上下板酌量放水使僅足濟運無致太泄仍於閘內引河兩旁開副河二道每道開𨗳水之小渠五處二道共十處如用水時先開一渠如不足再開一渠又不足乃再開一渠漸次開放水足即止不可多開致水盡泄十里鋪閘亦宜倣此通濟閘通濟閘舊例下板十二塊今宜仍舊但閘夫利於少下故閘之上下每有阻澀須時為稽查使板全下則運艘自可通行矣如船少時自當一塘灌一塘若濟寧以南一帶船多須天井閘過四塘或過五塘此閘始放一塘則水不妄泄上下自無淺阻之虞若上下水勢足用又不必儘塘灌放耽延時日須一塘約過二百隻可滿寺前閘一塘足矣豫斟酌南北之宜專以此閘為界水第三閘蓋寺前閘啓板放船則此閘之板嚴下水自不至於南泄也又此閘亦宜下板十八塊以積泗河之水使常盛滿則南運之水自沛然有餘矣又通濟閘宜下板十八塊蓋必多下板方能蓄水而閘板又不宜多啓恐其泄水太甚故或三日一次啓板或二日一次啓板必不得已亦必一日一次啓板斷不可一日二次或三次以致泄水太甚後不能繼啓板之後船已過完即速下板而㑹牌亦不可早送必俟次日方可送到寺前鋪閘使馬場湖水必由白嘴入運河將通濟閘上一塘灌滿然後啓寺前鋪閘則上源之水不致多泄而南旺上下不致淺阻矣白嘴白嘴宜建閘一座使馬場湖之水由此入運則不致一泄無餘蓋此處宜與通濟閘相照應如通濟閘下板須使馬場湖水灌滿運河然後送㑹牌到寺前鋪使寺前鋪啓板則南旺之水不致大泄於南矣大長溝東宜建閘南旺之水南北分流往往南則有餘北則不足蓋以南尚有諸湖以為之接濟而北止有南方一線之水也須使馬場湖之水足以敵南旺之水使南旺之水不致大往南泄則北運之水自不至於不足故宜於大長溝東建石閘一座使馬場湖之水由馮家滚水壩下引河內入運則足以敵南旺之水而不使南泄或曰馬場湖之水雖五里營閘已壞尚有安居閘十里鋪閘及楊家壩皆可以泄水何必又於大長溝建閘乎不知安居閘十里鋪閘俱在通濟閘下不足以敵南旺之水此閘一開直以馬場湖濟南運不足則開金口壩以助之以汶河之水專濟北運不足則以蜀山湖馬踏湖之水助之是以泗水濟南運汶水濟北運中止隔寺前鋪至栁林閘一塘以相為貫通而已南界水閘宜於大長溝擺渡口建石閘一座以界泗水使泗水不得北行則以泗河之水専濟南運而濟寧以南一帶運河可無淺阻此閘亦宜下板十八塊積水使由十字河入南旺湖中泗河口宜於小長溝叠路之南開一泗河口即於馬場湖內開泗河一道直引泗河之水由此入運仍於泗河之南築堤將馬場湖界出則以泗河之水濟南運而以汶河之水専濟北運則東昌一帶運河永無淺阻之患泗河北仍宜建界水閘一座又泗河口宜開十字河對過使水由馮家滚水壩往西由蜀山湖南岸開引河一道再於引河之北築堤一道隔斷蜀山湖直引至十字河對過開河口一道使入運河水小則用以濟運水大亦可由十字河分泄入南旺湖中蓄以濟運又泗河口宜改於寺前鋪閘之北使從利運閘入運將利運閘之南汶河東堤之東開泗河一道又於泗河之東建堤一道以禦蜀山湖之水使泗河之水由馬場湖由馮家滚水壩往北直至利運閘八運以濟南運則南運之水亦無不足之患矣改泗河口宜於兖州府金口閘之北相地勢所宜近於泉河者再開泗河口一道使之由泉河入洸河至濟寧北隔斷府河於府河之北另開引河一道引水至蓮水坡即今濟寧州西葦湖也使由馮家滚水壩入運寺前閘寺前閘最宜嚴謹蓋南旺之水南行最順此閘一不嚴謹則水之泄於南者太多而北運勢必淺阻若逢天旱之年汶水不足濟運開利運閘以濟北運則此閘尤為緊要此閘既嚴而栁林閘十里閘開河閘俱不下板而水始可以通行北注若一閘下板水即不能北往矣乙酉初夏汶河水微不能濟運已經用此法以濟北運甚覺有益豫相度形勢特以此閘為界水第二閘蓋栁林閘啓板放船專恃此閘嚴謹下板堵水使不南行若此閘下板或少或板不嚴謹則水之南泄太多不惟濟寧以南之民田被淹而北運反苦無水矣故以此閘為界水第二閘亦以堵水之南行也寺前鋪閘寺前鋪閘不可多開啓板太勤則泄水必多閘下糧船必積二百餘隻足滿一塘方可啓板閘板一啓即速過船船過完即速閉板則水之所泄必少矣又寺前鋪閘宜下板十八塊蓋板須多下則水不大泄如閘上水大令由盛進口張箱口入南旺湖以蓄之務使水足濟運而止尤宜加板草塞席貼毋使泄水乃妙查此閘最關緊要蓋南泄太多則水之北行者必少也中界水閘宜於寺前鋪閘作中界水閘使泗水不得北行汶水不得南行則汶河泗河各有專濟之功矣此閘亦宜下板十八塊積水使由焦鸞口盛進口張箱口入南旺湖中蓄以待用利運閘此閘專節宣蜀山湖水湖水若小則此閘宜堅閉萬不可開湖水若大則將閘板全啓將北界水閘中略水閘多下板塊使蜀山湖之水由焦鸞盛進張箱三口直過南旺湖中蓄以待用則南旺湖中既可以蓄水而蜀山湖以北之民田亦免致漫淹矣又利運閘必不可開蓋利南運而不利北運者也南運原無不利何須此閘北運每逢淺阻則此閘適足為害此閘一開南方之運行固利而南方之民田淹沒者正復不少且南方多此一水止多一淹民田之水而北方少此一水遂少一送糧船之水矣故此閘斷不可開也又利運閘在寺前鋪閘之北在栁林閘之南為蜀山湖之門戶相𫝊以為濟南運而不濟北運豫始亦信以為然見南來濟運之水甚多而北運每苦無水故二年以來堅閉利運閘不令開放使蜀山湖水由田家樓口邢家林口入汶河出南旺分水口濟運至初夏聖駕回鑾見運河自南旺以北水勢甚小乃相度形勢量水淺深知利運閘之水可以北注於是令閘官堅閉寺前鋪閘並啓栁林十里開河三閘之板開利運閘放水北注其勢暢流心竊喜之遂赴臺莊接駕豈期閘官不用吾命寺前鋪閘數日並不下板以致水盡南往南旺以北水勢仍小聖駕一到豫恐有淺阻乃閉開河閘板袁口閘板靳口閘板俟聖駕到時即為啓板幸得龍舟無阻方聖駕在五里鋪下營見河水甚小一夜之間內侍到閘數次問水大小衆河官紛紛議論有謂利運閘濟南運而不濟北運者有謂當閉利運閘者有謂當閉栁林閘者豫雖有百口無能置辨及聖駕已過河水更小蓋因隨駕船隻不時北上閘板難下泄水太過糧船停泊南旺塘內已月餘矣不能行走乃堅閉寺前鋪閘啓栁林閘十里閘開河閘各板開利運閘放水北注而從前停泊之糧船遄行無阻自此以後河官閘官乃皆知利運閘可以濟北運矣前言濟南運而不濟北運者蓋以利運閘之水一過寺前鋪閘至通濟閘有三十餘里之逺且地勢最下水勢就下安得而不往南乎北過栁林閘至十里閘止十里逺又有汶水南行栁林閘一啓板汶河之水且往南流利運閘之水又安能北往乎是利運常開則止濟南運而不濟北運矣余今用一法南北兼濟將閘板常閉南邊少水則閉栁林閘啓寺前鋪板開利運閘放水以濟南運水勢足用即行下板不可多泄北邊少水則閉寺前鋪閘啓栁林十里開河三閘之板開利運閘放水以濟北運水勢足用即行下板則南北可以兼濟而水勢不致妄泄似為得節宣之要矣栁林閘栁林閘板宜嚴下用席貼草塞毋使過水閘下亦須積船二百餘隻方可啓板板啓完即速過船船過完即速閉板不可走泄水利吾欲以栁林閘為界水閘使汶河之水盡濟北運南運則用馬場湖水以濟之如馬場湖水不足用南旺水以助之又栁林閘為南運第一閘最關緊要須多下板草塞席貼不可輕忽蓋南行水多則北運之水必少且此塘無慮水大水大則由斗門入南旺湖以蓄之北運用水則放之北行南運用水則放之南行斷不可使之輕易過栁林閘也蓋直欲以此閘為界水閘使汶水止濟北運而泗水竟濟南運也此閘之板尤宜少啓或三日一次或兩日一次至不得已亦須一日一次决不可使水多泄於南也栁林閘放船法栁林閘為南運之第一閘南旺以南湖水甚多不虞水少故栁林閘宜常閉南旺以北止恃此一線之水故十里閘開河閘宜常開但恐北既有餘而南或不足又宜暫閉十里閘將栁林閘亮板一塊以接濟南運然惟北運之水有餘乃可不然恐南有水而北又無水矣不可不慮也南旺塘河原所以酌南北之宜南運水小宜啓栁林閘板放水使南北運水小宜啓十里閘板放水使北若南北水俱足用而汶河之水仍大則宜閉栁林閘十里閘使水由斗門入南旺湖仍以備南北不時之需舊例栁林閘為南旺上閘十里閘為南旺下閘一例啓閉豫今直以栁林閘為界水第一閘常閉此閘堵水使不南行汶水専濟北運泗水専濟南運栁林閘下糧船積至二百方可開放一次決不可輕易啓板使水南泄也蓋南運原不少水多泄於南不惟堤岸難保民田受淹而糧船亦難行走况北運之需水更急乎北界水閘宜以栁林閘為北界水閘使汶河之水不得南行直注北河則自南旺以至臨清可無淺阻之患矣此閘宜下板十八塊若運河水大使由五斗門入南旺湖中蓄以待用蜀山湖蜀山湖所以蓄水濟運也故冬月挑河時將汶河之水盡收入湖以備春夏之用較他湖為最緊要但從前湖水盛大則由馮家壩滚入馬場湖今馮家壩已經堵築閉塞矣蓋馬場湖已受府河泗河之水故不必再加以此湖之水也但數年以來開利運閘則此湖之水多泄於南故北運每苦淺阻今宜將利運閘永為閉塞而此湖之水専濟北運逮北河水小然後開田家樓邢家林河口出分水口閉栁林閘開十里閘使水北注則北河之水自無不足矣又蜀山湖周圍六十五里零一百二十步計地一千八百九十餘頃除宋尚書祭田地十二頃并髙亢地八頃五十三畝令民佃種外其餘一千八百六十九頃四十六畝二分蓄水有南月河口邢家林口田家樓口胡家樓口又長溝有滚水石壩一道東岸有陳蔡口每湖水大則從此出入馬場湖南旺湖南旺湖蓄水原以濟運河之不足者也南運不足則開濟運閘放水使南今之十字河是也北運不足則開關家大閘五里鋪滚水石壩放水北注不知始於何人起自何年竟將關家大閘滚水石壩實行堵築而所常開者十字河也南運湖水既多而又常開十字河故濟寧魚臺民田每受淹沒北運既無湖水以為之接濟而又將關家大閘滚水石壩永行堵塞所以東昌一帶糧船每遭淺阻今宜將十字河永行堵塞將滚水石壩仍行開通或再將關家大閘開通或將王化家莊對岸河南開通建石閘一座以濟北運則北河永無淺阻之患矣復南旺湖或曰安山湖招墾升課矣固宜復南旺湖並未招墾升課湖未嘗不在也而又何為言復乎豫曰雖未招墾而汶巨嘉之私墾者不下數百頃矣特未升課耳湖既佃種則將十二斗門盡行堵閉汶河之水雖值大發之時涓滴不得入湖湖雖未廢而其實已經久廢矣今欲復南旺湖惟將各斗門盡行重修仍置閘板酌量啓閉仍將各斗門內之引河大加疏濬務使深通則南旺湖之舊制庶可復矣南旺主簿每年重運過完之後如遇汶河水發即將栁林閘嚴閉宜將寺前閘嚴閉使水由各斗門入南旺湖再看水勢之大小如水不甚大即將十里閘並開河閘亦嚴閉收水入南旺湖如南旺湖滿水勢仍大即將十里閘開河閘及迤北各閘閘板全啓放水北行蓋北行入海為近不百里即有戴家廟三空橋泄水入海再北又有張秋五空橋泄水入海再北又有聊城之减水閘博平之減水閘皆泄水入海者也所以嚴閉栁林寺前二閘者以水不可往南行南行之水入海甚逺也查南行之水直至宿遷始有西寧橋可以泄水入海南旺至宿遷七八百里安能一時入海中間田地之淹沒者不知幾何也豫所以分汶河之水専濟北運而以泗河之水専濟南運者以水小之時東昌一帶不至膠舟水大之時南陽夏鎮徐州邳州不至盡為澤國也然此就微山湖昭陽湖南陽湖水大而言之也若此三湖水小又宜閉十里開河二閘放水南行蓄之各湖但南旺去徐沛甚逺水之大小恐無由知而南陽甚近又同屬運河㕔轄視南陽水之大小則知徐沛矣南旺各斗門南旺各斗門俱宜重修仍照舊下板每遇伏秋水長河水入湖則啓板收水湖水入河則下板蓄水不使泄出至秋後無水可收仍於湖口築壩堵水直至春夏水小糧運難行時方可酌量開放陸續接濟南旺湖九斗門閘各閘俱宜下板以便蓄水各閘仍宜𣲖夫四名輪流守板常有二名在閘汶河之水入湖則啓板放水若湖水入河則宜下板堵閉蓄之湖中俟運河之水不足用時然後酌量開放而仍不由此斗門開放如北運不足宜於北湖堤頭建閘一座其下開引河一道使由開河以北出兼濟閘接濟南旺分水南旺分水最宜斟酌如春月重運盛行之時南邊淺阻則多放水往南北邊淺阻則多放水往北若遇伏秋水長運河水大重運在北則水往南放重運在南則水往北放蓋使水勢常平糧船易行也又南旺分水地形最髙所謂水脊也主事王寵論蓄泄之大略曰南旺旱乾嘗在二三四月方其旱也每有淺阻之患前此或濬泉源或放湖水或築土壩多方以蓄之愚以為不若一日一啓以嚴閘座為上䇿每泛濫於六七八月當其溢也每有衝覆之患前此或開南旺湖或開減水閘或決金口壩多方以泄之愚以為不若以不閉閘座開月河行船為上策豫嘗當旱涸之時自分水逆流而上至黑馬溝凡二十里或三百料或五百料或千料船皆能通行於兩河而無阻則閘座之為緊要可知又嘗窮歷汶源至萊蕪原山之陽不過三百餘里之泉源而欲分流以供三千餘里之漕渠使非築塞疏濬啓閉有方又安能行轉運哉則閘座之當緊要又可知矣至於旱乾之甚則當行水車之法試以百船論之每船漕卒十人至南旺盤剝當費百也此法行則每船止用一人給車二十輛什二守閘什八踏車以挽湖水每車用四人二十車用八十人一車加水七寸二十車則加一丈四尺逮五十里之湖水乾則天雨必至矣此所以可行而無弊也水大之甚則開南旺以收水開永通閘以行船不惟可分殺滔天之勢且免濟寧一帶閘河之險矣而潘公季馴則曰南旺地髙決諸南則南流決諸北則北流惟吾所用耳當春夏糧運盛行之時正汶水微弱之際分流則不足合流則有餘宜效輪番法如運艘淺於南則閉南旺北閘令汶盡南流如運艘淺於北則閉南旺南閘令汶盡北流當其南也更發濱南諸湖水佐之當其北也更發濱北諸湖水佐之泉湖兼注南北合流即遇旱暵靡不克濟此誠以智役水以人勝天力不勞而功倍也舊例大挑三年再舉正月十五築壩絶流興工至二月中完主事笪東光議創上源閘壩以省大挑略曰竊照運河實國家命脉攸關而其最莫如南旺分水每遇大挑征夫以萬計支銀以千計非惟勞費不資且斷流二月南北舟楫不通是一利亦一害也歲丁卯一挑越己巳又挑三年之內再舉大役民力得無竭乎推原其故皆因南旺上接汶河及徂徠諸泉平時固皆清流霖雨驟至則數百里之沙泥盡洗而流入汶河至南旺則地勢平洋而又有二閘橫攔故沙泥盡淤比他處獨髙每水漲一次則淤髙一尺積一年則髙數尺二年不挑則河身盡填此大挑之役亦勢之不得不然者也乃從來大挑用工甚拙不識分工自下而上放水為便每築隔起水晝夜不息皆用力於無益之地其始也有打壩築隔之勞其既也有起水之苦其終也又費起壩挑隔之力曠日既久大壩一開上水隨至各處淤淺俱不及挑傾堤亦不能築名曰大挑實非完工矣曷若於上源打壩之處設立石閘一座隨時啓閉又於閘之左右各建減水閘一座名曰斗門一通馬踏湖一通蜀山湖平時則斗門盡閉中閘常開放水入運一遇洪水則斗門盡啓中閘下板五塊沙泥盡隨斗門入湖如此則二湖之役不惟可為氷匱亦可為沙匱矣縱橫水溷濁未可盡汰亦能去其十之七八雖十年一挑亦可也萬一各處或有淤淺傾頽欲行濬撈則一札板之下可以斷流不用樁草夫力之煩又無曠日稽遲之苦用力少而成功多雖每年一挑亦不為勞矣河道侍郎萬恭議改於九月誠為先事預圖且量地施工力既不費於槩挑乘時興役夫又不苦於凍沍回空已盡築壩絶流疏濬一完籍水封閉是新運之便也萬歷四年開鑿月河間年一大挑每年一小挑大挑之期定於九十月起工其回空及一應船隻皆由月河行走官民稱便自明季崇禎壬午年間土寇旱荒一時並作月河堙廢於是改為十一月開壩十二月正月挑浚祁寒膠凍墮指裂膚人夫施力十倍艱辛今閘基河形俱在設法修復猶屬易事國用稍裕即應整理至南旺運河兩岸每年挑河積土成山一經霖雨仍淋入河中徒勞挑浚殊為無益南岸積沙近已捲去北岸尚未興挑應於閒曠之時展運使平嗣後責令挑河夫役務將所挑沙土抬至廣衍處所不得即置岸旁庶為得之南旺大壩南旺大壩正月議定開壩之期即於先期三日將南越河口北越河口田家樓口徐建口盡行堵築堅固勿令過水然後開壩開壩之後先通漕放水三日然後各閘下板栁林閘十里閘板皆全下以後南河水小將栁林閘板少下十里閘板多下如北河水小將栁林閘板多下十里閘板少下如水太小即將十里閘板全啓如過船之時恐船淺擱下板數塊蓄水養船船過之後依舊全啓大壩既開之後即宜赴州縣疏濬泉源使水暢流濟運南旺開壩安居閘十里閘楊家壩金口壩十字河俱不宜開止宜開魯橋壩俟南河水小之時先開安居閘如水再小方可開十里閘如遇天旱之年北河水小南旺塘內及開河塘內不得存船以致壅蔽水勢不得暢流南旺大小挑查宋尚書祠記云用白英計作壩戴村橫亘五里遏汶水令盡出於南旺乃分為二水以其三南入於漕河以接徐吕以其七北㑹於臨清以合漳衛此舊制也其三分往南者蓋以南有府河泗河洸河並馬場獨山南陽昭陽微山各湖又有彭家口大泛口二河自餘諸泉不可勝數此所以三分往南而不患其少也不知始自何年竟改為七分往南惟其七分往南所以每逢雨潦之年濟寧魚沛一帶民田往往淹沒今議仍改為三分往南則民田得免淹沒之患其七分往北者蓋以北止有安山一湖接濟所以七分往北而不患其水多不知始自何年竟改為三分往北水勢甚微而安山一湖又經招租起科無水接濟所以每逢亢旱之年東昌一帶在在淺阻今議仍改為七分往北庶糧船無淺阻之患居濟一得卷二
